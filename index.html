<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Pro - Premium Virtual Guard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smartgate-pro-v1";

        window.fb = { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan { animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 0px; display: none; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size);
                        svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24");
                        svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor");
                        svg.setAttribute("stroke-width", "2.5");
                        svg.setAttribute("stroke-linecap", "round");
                        svg.setAttribute("stroke-linejoin", "round");
                        svg.setAttribute("class", `lucide lucide-${name} ${className}`);
                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
                            svg.appendChild(element);
                        });
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <div ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        function App() {
            const { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged } = window.fb || {};
            
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            useEffect(() => {
                if (!auth) return;
                signInAnonymously(auth).catch(err => {
                    if (err.code === 'auth/configuration-not-found') {
                        showStatus("Aktifkan 'Anonymous Auth' di Firebase!", "error");
                    }
                });
                return onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                
                const unsubV = onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                
                return () => { unsubV(); unsubL(); };
            }, [user, db]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const handleRegisterVehicle = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const formData = new FormData(e.target);
                const plat = formData.get('platNomor').toUpperCase().trim();
                const nama = formData.get('namaPemilik').trim();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), {
                        platNomor: plat, namaPemilik: nama, createdAt: Timestamp.now(), status: 'di_luar'
                    });
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${plat}`;
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl, date: new Date().toLocaleDateString('id-ID') });
                    showStatus(`Kendaraan ${plat} Berhasil Terdaftar!`);
                } catch (err) { 
                    showStatus("Gagal simpan ke DB. Cek Rules Firestore!", "error"); 
                } finally { setIsLoading(false); }
            };

            const processScan = async (val) => {
                if (!val) return;
                setIsLoading(true);
                const plat = val.toUpperCase().trim();
                try {
                    const vDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat));
                    if (!vDoc.exists()) {
                        showStatus("KENDARAAN BELUM TERDAFTAR!", "error");
                        return;
                    }
                    const vData = vDoc.data();
                    if (vData.status === 'di_luar') {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            platNomor: plat, namaPemilik: vData.namaPemilik, tipe: 'MASUK',
                            timestampMasuk: Timestamp.now(), status: 'AKTIF'
                        });
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_dalam' });
                        showStatus("SELAMAT DATANG: " + plat);
                    } else {
                        const active = logs.find(l => l.platNomor === plat && l.status === 'AKTIF');
                        if (active) {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', active.id), {
                                timestampKeluar: Timestamp.now(), status: 'SELESAI'
                            });
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_luar' });
                            showStatus("BERHASIL KELUAR: " + plat);
                        }
                    }
                    setView('dashboard');
                } catch (err) { showStatus("Error Sistem. Cek Koneksi!", "error"); }
                finally { setIsLoading(false); }
            };

            const handlePrint = () => {
                const win = window.open('', '_blank');
                win.document.write(`
                    <html><head><title>Stiker Akses - ${registeredQR.platNomor}</title>
                    <style>
                        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; background: #fff; }
                        .card { border: 5px solid #000; padding: 30px; border-radius: 40px; text-align: center; width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
                        .tag { background: #000; color: #fff; display: inline-block; padding: 5px 20px; border-radius: 10px; font-weight: 900; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
                        .plat { font-size: 60px; font-weight: 900; margin: 15px 0; font-family: 'Courier New', monospace; border-top: 2px solid #eee; border-bottom: 2px solid #eee; padding: 10px 0; }
                        .owner { font-size: 20px; font-weight: 800; color: #333; text-transform: uppercase; margin-top: 10px; }
                        .id { font-size: 10px; color: #999; margin-top: 25px; font-weight: bold; }
                    </style></head>
                    <body onload="window.print(); window.close();">
                        <div class="card">
                            <div class="tag">AUTHORIZED VEHICLE</div>
                            <div><img src="${registeredQR.qrUrl}" style="width:240px;" /></div>
                            <div class="plat">${registeredQR.platNomor}</div>
                            <div class="owner">${registeredQR.namaPemilik}</div>
                            <div class="id">SMARTGATE ACCESS SYSTEM • VERIFIED ${registeredQR.date}</div>
                        </div>
                    </body></html>
                `);
            };

            const filteredLogs = logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || l.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden">
                    {}
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-80 bg-white border-r border-slate-100 transition-all duration-500 z-50 p-8 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12">
                            <div className="h-14 w-14 bg-gradient-to-br from-indigo-600 to-blue-600 rounded-[1.25rem] flex items-center justify-center text-white shadow-xl shadow-indigo-100">
                                <Icon name="qr-code" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold tracking-tight text-slate-800">SmartGate</h1>
                                <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest leading-none mt-1">Virtual Guard</p>
                            </div>
                        </div>

                        <nav className="space-y-3 flex-1">
                            {[
                                {id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Overview'},
                                {id: 'scan', icon: 'camera', label: 'Scanner Mode'},
                                {id: 'register', icon: 'user-plus', label: 'Registrasi Unit'},
                                {id: 'history', icon: 'clock-3', label: 'Log Aktivitas'}
                            ].map(item => (
                                <button 
                                    key={item.id} 
                                    onClick={() => {setView(item.id); setIsSidebarOpen(false)}} 
                                    className={`flex items-center space-x-4 w-full p-4 rounded-2xl font-bold text-sm transition-all duration-300 ${view === item.id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-200' : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'}`}
                                >
                                    <Icon name={item.icon} size={22} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto bg-slate-50 p-5 rounded-[2rem] border border-slate-100 flex items-center gap-4">
                            <div className="h-10 w-10 rounded-full bg-white shadow-sm flex items-center justify-center text-indigo-600 font-black text-xs border">ID</div>
                            <div className="overflow-hidden">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Station</p>
                                <p className="text-xs font-bold text-slate-700 truncate">{user?.uid || 'Connecting...'}</p>
                            </div>
                        </div>
                    </aside>

                    {}
                    <main className="flex-1 p-6 md:p-12 relative overflow-y-auto h-screen bg-[#F8FAFC]">
                        {/* Mobile Header */}
                        <header className="md:hidden flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-3 bg-slate-50 rounded-2xl text-slate-600"><Icon name="menu" /></button>
                            <span className="font-black text-indigo-600 text-xs tracking-[0.2em] uppercase">Operator Pro</span>
                        </header>

                        {}
                        {statusMsg && (
                            <div className={`fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] text-white font-bold shadow-2xl z-[100] flex items-center gap-4 animate-bounce ${statusMsg.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                <Icon name={statusMsg.type === 'success' ? 'check-circle-2' : 'alert-circle'} size={20} />
                                <span className="text-sm">{statusMsg.text}</span>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <div className="bg-indigo-600 p-12 rounded-[3.5rem] text-white shadow-2xl shadow-indigo-100 relative overflow-hidden group">
                                    <div className="relative z-10">
                                        <h2 className="text-4xl font-black mb-4 tracking-tight">Status Gerbang: Aktif</h2>
                                        <p className="text-indigo-100 font-medium max-w-lg mb-10 leading-relaxed opacity-80">Sistem otomasi akses tanpa palang mendeteksi kendaraan secara real-time. Data disinkronkan ke database cloud.</p>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10 hover:bg-white/20 transition-all">
                                                <p className="text-[10px] font-black opacity-60 uppercase tracking-[0.2em] mb-2">Total Unit</p>
                                                <p className="text-4xl font-black">{vehicles.length}</p>
                                            </div>
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10 hover:bg-white/20 transition-all">
                                                <p className="text-[10px] font-black opacity-60 uppercase tracking-[0.2em] mb-2">Di Dalam Area</p>
                                                <p className="text-4xl font-black text-emerald-300">{vehicles.filter(v=>v.status==='di_dalam').length}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <Icon name="car" size={300} className="absolute -right-16 -bottom-16 opacity-10 rotate-12 transition-transform duration-1000 group-hover:rotate-6" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={()=>setView('scan')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl hover:-translate-y-1 transition-all group">
                                        <div className="h-20 w-20 bg-indigo-50 rounded-[2rem] flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all"><Icon name="camera" size={32} /></div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Scan & Akses</h3>
                                            <p className="text-slate-400 font-bold text-sm">Mode operasional gerbang</p>
                                        </div>
                                    </button>
                                    <button onClick={()=>setView('register')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl hover:-translate-y-1 transition-all group">
                                        <div className="h-20 w-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all"><Icon name="plus-circle" size={32} /></div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Registrasi Unit</h3>
                                            <p className="text-slate-400 font-bold text-sm">Input data kendaraan baru</p>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'scan' && (
                            <div className="max-w-2xl mx-auto space-y-8 text-center animate-in zoom-in-95 duration-500">
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">Mode Pemindaian</h2>
                                    <p className="text-slate-500 font-bold uppercase text-[10px] tracking-[0.3em]">Arahkan QR ke Kamera atau Input Manual</p>
                                </div>
                                
                                <div className="bg-slate-900 aspect-square rounded-[4rem] p-16 relative overflow-hidden border-[15px] border-white shadow-2xl shadow-indigo-100">
                                    <div className="w-full h-full border-2 border-indigo-500/20 rounded-[3rem] relative flex items-center justify-center">
                                        {}
                                        <div className="absolute top-0 left-0 w-20 h-20 border-t-[6px] border-l-[6px] border-indigo-400 rounded-tl-[2rem]"></div>
                                        <div className="absolute top-0 right-0 w-20 h-20 border-t-[6px] border-r-[6px] border-indigo-400 rounded-tr-[2rem]"></div>
                                        <div className="absolute bottom-0 left-0 w-20 h-20 border-b-[6px] border-l-[6px] border-indigo-400 rounded-bl-[2rem]"></div>
                                        <div className="absolute bottom-0 right-0 w-20 h-20 border-b-[6px] border-r-[6px] border-indigo-400 rounded-br-[2rem]"></div>
                                        
                                        <div className="absolute w-full h-2 bg-gradient-to-r from-transparent via-indigo-400 to-transparent top-0 animate-scan shadow-[0_0_20px_indigo]"></div>
                                        <Icon name="scan" size={150} className="text-white/5" />
                                    </div>
                                    <input 
                                        autoFocus 
                                        placeholder="Ketik Plat / Scan QR..." 
                                        onKeyPress={e => e.key === 'Enter' && processScan(e.target.value)} 
                                        className="absolute bottom-16 left-1/2 -translate-x-1/2 w-[85%] p-6 bg-white/10 text-white text-center rounded-3xl border border-white/20 outline-none uppercase font-black text-3xl placeholder:text-white/10 tracking-tighter shadow-inner focus:bg-white/20 transition-all" 
                                    />
                                </div>
                                <button onClick={()=>setView('dashboard')} className="text-slate-400 font-black hover:text-indigo-600 transition-all uppercase text-xs tracking-[0.2em]">Batalkan Sesi</button>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-2xl mx-auto animate-in slide-in-from-bottom-12 duration-700">
                                {!registeredQR ? (
                                    <div className="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-xl shadow-slate-100">
                                        <div className="flex items-center gap-6 mb-12">
                                            <div className="h-16 w-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center"><Icon name="user-plus" size={32} /></div>
                                            <h2 className="text-3xl font-black text-slate-800">Form Pendaftaran</h2>
                                        </div>
                                        <form onSubmit={handleRegisterVehicle} className="space-y-8">
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 block">Nomor Plat</label>
                                                <input name="platNomor" required placeholder="B 1234 XYZ" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-black uppercase outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50/50 transition-all text-3xl tracking-tighter" />
                                            </div>
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 block">Nama Lengkap Pemilik</label>
                                                <input name="namaPemilik" required placeholder="NAMA LENGKAP" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-bold uppercase outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50/50 transition-all text-lg" />
                                            </div>
                                            <button disabled={isLoading} className="w-full bg-indigo-600 text-white p-7 rounded-[2rem] font-black text-lg shadow-2xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">{isLoading ? 'Memproses Data...' : 'SIMPAN & GENERATE QR'}</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-white p-12 rounded-[4rem] border-t-[15px] border-indigo-600 text-center space-y-10 shadow-2xl animate-in zoom-in-90 duration-500">
                                        <div className="bg-slate-50 p-10 rounded-[3rem] inline-block border-2 border-dashed border-slate-200">
                                            <img src={registeredQR.qrUrl} className="mx-auto w-64 h-64 rounded-2xl shadow-lg border-4 border-white" />
                                        </div>
                                        <div>
                                            <p className="text-indigo-600 font-black text-xs uppercase tracking-[0.3em] mb-2">Unit Berhasil Terdaftar</p>
                                            <h3 className="text-6xl font-black tracking-tighter text-slate-900">{registeredQR.platNomor}</h3>
                                            <p className="text-slate-500 font-bold uppercase mt-2 tracking-widest leading-none">{registeredQR.namaPemilik}</p>
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <button onClick={handlePrint} className="flex-1 bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 shadow-xl hover:bg-black transition-all"><Icon name="printer" size={24} /> CETAK STIKER</button>
                                            <button onClick={()=>setRegisteredQR(null)} className="flex-1 bg-slate-100 p-6 rounded-[2rem] font-black text-slate-600 hover:bg-slate-200 transition-all">SELESAI</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-10 animate-in fade-in duration-700">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                    <div className="space-y-1">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">Riwayat Akses</h2>
                                        <p className="text-slate-400 font-bold text-xs uppercase tracking-[0.2em]">Data Trafik Keluar Masuk Kendaraan</p>
                                    </div>
                                    <div className="relative w-full md:w-96">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300" size={20} />
                                        <input placeholder="Cari Plat / Nama..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-16 pr-8 py-5 border border-slate-100 bg-white rounded-3xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 font-bold text-sm shadow-sm transition-all" />
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[3.5rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 border-b border-slate-50">
                                                <tr>
                                                    <th className="p-8 text-[10px] font-black uppercase text-slate-400 tracking-[0.3em]">Identitas Unit</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] text-center">Waktu Masuk</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] text-center">Waktu Keluar</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] text-right">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredLogs.map(l => (
                                                    <tr key={l.id} className="hover:bg-indigo-50/20 transition-all duration-300 group">
                                                        <td className="p-8">
                                                            <div className="font-black text-2xl text-slate-800 group-hover:text-indigo-600 transition-colors tracking-tighter uppercase">{l.platNomor}</div>
                                                            <div className="text-[10px] uppercase font-bold text-slate-400 mt-1 tracking-widest">{l.namaPemilik}</div>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            <span className="text-xs font-black text-slate-600 block">{l.timestampMasuk?.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                                                            <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampMasuk?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            {l.timestampKeluar ? (
                                                                <>
                                                                    <span className="text-xs font-black text-slate-600 block">{l.timestampKeluar.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                                                                    <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampKeluar.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                                </>
                                                            ) : <span className="text-[10px] font-black text-indigo-400 italic bg-indigo-50 px-4 py-2 rounded-xl">Di Dalam Area</span>}
                                                        </td>
                                                        <td className="p-8 text-right">
                                                            <span className={`px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-sm ${l.status === 'AKTIF' ? 'bg-indigo-600 text-white shadow-indigo-100' : 'bg-slate-100 text-slate-400'}`}>
                                                                {l.status === 'AKTIF' ? 'AUTHORIZED' : 'FINISHED'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {filteredLogs.length === 0 && <div className="p-24 text-center text-slate-200"><Icon name="search" size={60} className="mx-auto mb-6 opacity-20" /><p className="font-black uppercase text-xs tracking-widest opacity-40">Data Tidak Ditemukan</p></div>}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
