<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartGate - AFDELING VI SEI ROKAN</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, enableIndexedDbPersistence, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smartgate-sei-rokan-v1";

        enableIndexedDbPersistence(db).catch((err) => {
            console.log("Persistence status:", err.code);
        });

        window.fb = { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged, query, where, limit, getDocs };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFFFFF; overflow-x: hidden; }
        
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        ::-webkit-scrollbar { width: 0px; display: none; }
        
        #reader { border: none !important; width: 100% !important; }
        #reader video { border-radius: 2rem !important; object-fit: cover !important; }

        @media print {
            body * { visibility: hidden; }
            .print-only, .print-only * { visibility: visible; }
            .print-only {
                position: fixed; left: 0; top: 0; width: 100%;
                display: flex !important; justify-content: center; align-items: center; height: 100vh;
                background: white; z-index: 9999;
            }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            const map = {
                'qr-code': 'QrCode', 'shield-check': 'ShieldCheck', 'car': 'Car', 'bike': 'Motorcycle',
                'layout-dashboard': 'LayoutDashboard', 'clock-3': 'Clock3', 'plus-circle': 'PlusCircle',
                'history': 'History', 'printer': 'Printer', 'search': 'Search', 'menu': 'Menu',
                'check-circle-2': 'CheckCircle2', 'alert-circle': 'AlertCircle', 'database': 'Database', 'x': 'X'
            };

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconData = window.lucide.icons[map[name] || name];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size); svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24"); svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor"); svg.setAttribute("stroke-width", "2.5");
                        svg.setAttribute("stroke-linecap", "round"); svg.setAttribute("stroke-linejoin", "round");
                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([k, v]) => element.setAttribute(k, v));
                            svg.appendChild(element);
                        });
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size]);
            return <div ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        function App() {
            const { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged, query, where, limit, getDocs } = window.fb || {};
            
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedQR, setSelectedQR] = useState(null);
            const [manualPlate, setManualPlate] = useState('');
            const [keteranganScan, setKeteranganScan] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const scannerRef = useRef(null);
            const isTransitioning = useRef(false);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                if (auth) {
                    signInAnonymously(auth).catch(console.error);
                    onAuthStateChanged(auth, setUser);
                }
                return () => clearInterval(timer);
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const unsubV = onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                return () => { unsubV(); unsubL(); };
            }, [user, db]);

            useEffect(() => {
                const handleScanner = async () => {
                    if (isTransitioning.current) return;
                    if (view === 'scan') {
                        isTransitioning.current = true;
                        try {
                            const html5QrCode = new Html5Qrcode("reader");
                            scannerRef.current = html5QrCode;
                            await html5QrCode.start(
                                { facingMode: "environment" }, 
                                { fps: 10, qrbox: { width: 250, height: 250 } },
                                (decoded) => { processScan(decoded); },
                                () => {}
                            );
                        } catch (err) {
                            console.error("Scanner error:", err);
                        } finally {
                            isTransitioning.current = false;
                        }
                    } else {
                        if (scannerRef.current && scannerRef.current.isScanning) {
                            isTransitioning.current = true;
                            try {
                                await scannerRef.current.stop();
                                scannerRef.current = null;
                            } catch (err) {
                                console.error("Scanner stop error:", err);
                            } finally {
                                isTransitioning.current = false;
                            }
                        }
                    }
                };
                handleScanner();
            }, [view]);

            const processScan = async (val) => {
                const plat = (val || manualPlate).toUpperCase().trim();
                if (!plat) { showStatus("INPUT PLAT NOMOR!", "error"); return; }
                setIsLoading(true);
                try {
                    const vDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat);
                    const vDoc = await getDoc(vDocRef);
                    
                    if (!vDoc.exists()) { 
                        showStatus(`UNIT ${plat} TIDAK TERDAFTAR!`, "error"); 
                        return; 
                    }
                    
                    const vData = vDoc.data();
                    
                    if (vData.status === 'di_luar' || !vData.status) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            platNomor: plat, 
                            namaPemilik: vData.namaPemilik, 
                            tipe: 'MASUK',
                            timestampMasuk: Timestamp.now(), 
                            status: 'AKTIF',
                            keterangan: keteranganScan || "Akses Rutin"
                        });
                        await updateDoc(vDocRef, { status: 'di_dalam' });
                        showStatus(`BERHASIL MASUK: ${plat}`);
                    } else {
                        const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                        const q = query(lRef, where("platNomor", "==", plat), where("status", "==", "AKTIF"), limit(1));
                        const querySnap = await getDocs(q);
                        
                        if (!querySnap.empty) {
                            const activeLogDoc = querySnap.docs[0];
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', activeLogDoc.id), {
                                timestampKeluar: Timestamp.now(), 
                                status: 'SELESAI'
                            });
                        }
                        
                        await updateDoc(vDocRef, { status: 'di_luar' });
                        showStatus(`BERHASIL KELUAR: ${plat}`);
                    }
                    
                    setManualPlate(''); 
                    setKeteranganScan(''); 
                    setView('dashboard');
                } catch (err) { 
                    console.error(err);
                    showStatus("Gagal memproses akses", "error"); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const fd = new FormData(e.target);
                const plat = fd.get('plat').toUpperCase().trim();
                const nama = fd.get('nama').trim();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), {
                        platNomor: plat, namaPemilik: nama, createdAt: Timestamp.now(), status: 'di_luar'
                    });
                    const url = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${plat}`;
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl: url });
                    showStatus("Pendaftaran Berhasil!");
                    e.target.reset();
                } catch (err) { showStatus("Gagal mendaftar", "error"); } finally { setIsLoading(false); }
            };

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#F8FAFC]">
                    {/* MOBILE OVERLAY */}
                    {isSidebarOpen && (
                        <div onClick={() => setIsSidebarOpen(false)} className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] md:hidden"></div>
                    )}

                    {/* MODAL QR PREVIEW */}
                    {selectedQR && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl relative animate-in zoom-in-95">
                                <button onClick={() => setSelectedQR(null)} className="absolute top-6 right-6 text-slate-300 hover:text-rose-500"><Icon name="x" size={24} /></button>
                                <div className="bg-emerald-50 p-6 rounded-[2rem] border-2 border-dashed border-emerald-100 mb-6 inline-block">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${selectedQR.platNomor}`} className="w-40 h-40 rounded-xl" alt="QR" />
                                </div>
                                <div className="mb-6">
                                    <h3 className="text-3xl font-black text-slate-900">{selectedQR.platNomor}</h3>
                                    <p className="text-emerald-600 font-bold uppercase text-[10px] tracking-widest mt-1">{selectedQR.namaPemilik}</p>
                                </div>
                                <button onClick={() => setSelectedQR(null)} className="w-full bg-slate-100 text-slate-500 p-4 rounded-[1.25rem] font-bold">TUTUP</button>
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 transition-transform duration-300 z-[60] p-8 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12">
                            <div className="h-12 w-12 bg-emerald-600 rounded-[1rem] flex items-center justify-center text-white shadow-xl">
                                <Icon name="qr-code" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold text-slate-800 leading-tight">SmartGate</h1>
                                <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mt-1">Afdeling VI</p>
                            </div>
                        </div>

                        <nav className="space-y-1 flex-1">
                            {[
                                {id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Utama'},
                                {id: 'scan', icon: 'shield-check', label: 'Scan Akses Satpam'},
                                {id: 'register', icon: 'plus-circle', label: 'Registrasi Unit'},
                                {id: 'units', icon: 'database', label: 'Data Unit Terdaftar'},
                                {id: 'history', icon: 'history', label: 'Log Aktivitas'}
                            ].map(item => (
                                <button key={item.id} onClick={() => {setView(item.id); setIsSidebarOpen(false)}} className={`flex items-center space-x-4 w-full p-4 rounded-xl font-bold text-sm transition-all ${view === item.id ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}>
                                    <Icon name={item.icon} size={20} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="mt-auto bg-emerald-50 p-4 rounded-[1.5rem] border border-emerald-100 flex items-center gap-3">
                            <div className="h-8 w-8 rounded-full bg-white flex items-center justify-center text-emerald-600 font-black text-[10px] border">VI</div>
                            <div className="overflow-hidden">
                                <p className="text-[8px] font-bold text-emerald-400 uppercase tracking-widest leading-none mb-1">Station</p>
                                <p className="text-[10px] font-bold text-emerald-900 truncate uppercase">KEBUN SEI ROKAN</p>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="md:hidden bg-white border-b p-4 flex items-center justify-between sticky top-0 z-50">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                                <Icon name="menu" size={24} />
                            </button>
                            <div className="text-center">
                                <h2 className="text-xs font-black text-emerald-600 uppercase tracking-widest leading-none">SmartGate</h2>
                                <p className="text-[8px] font-bold text-slate-400 uppercase">Afdeling VI</p>
                            </div>
                            <div className="w-10"></div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-12 relative">
                            {statusMsg && (
                                <div className={`fixed top-20 md:top-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-[1.5rem] text-white font-bold shadow-2xl z-[100] flex items-center gap-3 animate-in slide-in-from-top-4 ${statusMsg.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                    <Icon name={statusMsg.type === 'success' ? 'check-circle-2' : 'alert-circle'} size={18} />
                                    <span className="text-xs">{statusMsg.text}</span>
                                </div>
                            )}

                            {view === 'dashboard' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-emerald-600 p-8 md:p-20 rounded-[2.5rem] md:rounded-[4rem] text-white shadow-2xl relative overflow-hidden flex flex-col items-center text-center">
                                        <div className="relative z-10 space-y-4 md:space-y-8">
                                            <h2 className="text-3xl md:text-7xl font-black tracking-tighter uppercase leading-none">
                                                KEBUN <br/><span className="text-emerald-200">SEI ROKAN</span>
                                            </h2>
                                            <div className="text-5xl md:text-9xl font-black opacity-95 tracking-tighter tabular-nums drop-shadow-xl">
                                                {currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} 
                                            </div>
                                            <p className="text-[10px] md:text-base font-bold uppercase tracking-[0.3em] opacity-70 px-4"> Pos Penjagaan Keamanan</p>
                                        </div>
                                        <Icon name="shield-check" size={400} className="absolute -right-20 -bottom-20 opacity-10 rotate-12 pointer-events-none" />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                                        <button onClick={() => setView('scan')} className="bg-white p-8 md:p-12 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center gap-6 group hover:border-emerald-500 transition-all">
                                            <div className="h-16 w-16 md:h-20 md:w-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="shield-check" size={32}/></div>
                                            <div className="text-left">
                                                <h3 className="font-black text-xl md:text-2xl text-slate-800">MULAI SCAN</h3>
                                                <p className="text-slate-400 text-xs md:text-sm font-medium uppercase tracking-widest">Akses Keamanan</p>
                                            </div>
                                        </button>
                                        <button onClick={() => setView('register')} className="bg-white p-8 md:p-12 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center gap-6 group hover:border-emerald-500 transition-all">
                                            <div className="h-16 w-16 md:h-20 md:w-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="plus-circle" size={32}/></div>
                                            <div className="text-left">
                                                <h3 className="font-black text-xl md:text-2xl text-slate-800">DAFTAR UNIT</h3>
                                                <p className="text-slate-400 text-xs md:text-sm font-medium uppercase tracking-widest">Registrasi Baru</p>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {view === 'register' && (
                                <div className="max-w-2xl mx-auto space-y-6 animate-in slide-in-from-bottom-8">
                                    {!registeredQR ? (
                                        <div className="bg-white p-8 md:p-14 rounded-[3rem] border border-slate-100 shadow-xl">
                                            <div className="flex items-center gap-5 mb-10">
                                                <div className="h-16 w-16 bg-emerald-50 text-emerald-600 rounded-[1.5rem] flex items-center justify-center shadow-inner border border-emerald-100"><Icon name="plus-circle" size={32}/></div>
                                                <div>
                                                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">Registrasi Unit</h2>
                                                    <p className="text-emerald-500 font-bold uppercase text-[10px] tracking-widest mt-1">Database Kendaraan Afdeling VI</p>
                                                </div>
                                            </div>
                                            <form onSubmit={handleRegister} className="space-y-8">
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Nomor Plat Unit</label>
                                                    <input name="plat" required placeholder="BM 1234 XY" className="w-full p-6 bg-slate-50 text-emerald-700 rounded-[2rem] border-2 border-emerald-50 outline-none uppercase font-black text-2xl shadow-inner focus:bg-white focus:border-emerald-500 transition-all" />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Nama Pemilik</label>
                                                    <input name="nama" required placeholder="CONTOH: BUDI SANTOSO" className="w-full p-6 bg-slate-50 text-slate-700 rounded-[2rem] border-2 border-emerald-50 outline-none font-bold text-lg shadow-inner focus:bg-white focus:border-emerald-500 transition-all uppercase" />
                                                </div>
                                                <button disabled={isLoading} className="w-full bg-emerald-600 text-white p-6 rounded-[2rem] font-black text-xl shadow-xl hover:bg-emerald-700 transition-all active:scale-95 flex items-center justify-center gap-4">
                                                    <Icon name="check-circle-2" size={24} />
                                                    <span>{isLoading ? 'MEMPROSES...' : 'SIMPAN & BUAT STIKER'}</span>
                                                </button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="bg-white p-10 md:p-14 rounded-[3.5rem] border-t-[12px] border-emerald-600 shadow-2xl flex flex-col items-center text-center space-y-10 animate-in zoom-in-95">
                                            <div className="bg-[#F8FAFC] p-8 rounded-[2.5rem] border-2 border-dashed border-emerald-100 shadow-inner relative group">
                                                <img src={registeredQR.qrUrl} alt="QR" className="w-56 h-56 md:w-72 md:h-72 rounded-2xl bg-white p-2" />
                                            </div>
                                            <div>
                                                <p className="text-emerald-600 font-black text-[10px] uppercase tracking-[0.4em] mb-2">Unit Berhasil Terdaftar</p>
                                                <h3 className="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter leading-none mb-1">{registeredQR.platNomor}</h3>
                                                <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">{registeredQR.namaPemilik}</p>
                                            </div>
                                            <div className="flex flex-col md:flex-row gap-4 w-full">
                                                <button onClick={() => window.print()} className="flex-1 bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 hover:bg-black transition-all shadow-xl text-lg">
                                                    <Icon name="printer" size={20} /> CETAK STIKER
                                                </button>
                                                <button onClick={() => setRegisteredQR(null)} className="flex-1 bg-slate-100 text-slate-600 p-6 rounded-[2rem] font-black hover:bg-slate-200 transition-all text-lg">DAFTAR LAIN</button>
                                            </div>
                                            <div className="print-only">
                                                <div style={{ border: '4px solid black', padding: '50px', textAlign: 'center', borderRadius: '50px', width: '450px' }}>
                                                    <h2 style={{ fontSize: '28px', fontWeight: '900', margin: '0' }}>ACCESS AUTHORIZED</h2>
                                                    <p style={{ fontSize: '12px', fontWeight: 'bold', margin: '5px 0 25px 0', opacity: 0.6 }}>AFDELING VI - SEI ROKAN</p>
                                                    <img src={registeredQR.qrUrl} style={{ width: '280px', height: '280px' }} />
                                                    <h1 style={{ fontSize: '70px', fontWeight: '900', margin: '25px 0 0 0', letterSpacing: '-3px' }}>{registeredQR.platNomor}</h1>
                                                    <p style={{ fontSize: '18px', fontWeight: 'bold', borderTop: '2px solid black', paddingTop: '15px', marginTop: '10px' }}>{registeredQR.namaPemilik}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'scan' && (
                                <div className="max-w-2xl mx-auto space-y-8 text-center animate-in zoom-in-95 pb-24">
                                    <div className="space-y-1 text-left">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">Scan Otorisasi</h2>
                                        <p className="text-emerald-600 font-bold uppercase text-[10px] tracking-widest">Pos Keamanan VI Sei Rokan</p>
                                    </div>

                                    <div className="bg-slate-900 aspect-square rounded-[3rem] md:rounded-[5rem] p-4 md:p-6 relative overflow-hidden border-[10px] md:border-[20px] border-white shadow-2xl">
                                        <div id="reader" className="w-full h-full rounded-[2rem] md:rounded-[4rem] overflow-hidden"></div>
                                        <div className="absolute inset-0 pointer-events-none p-8 md:p-16">
                                            <div className="w-full h-full border-2 border-emerald-500/25 rounded-[2rem] md:rounded-[4rem] relative">
                                                <div className="absolute top-0 left-0 w-12 h-12 border-t-[6px] border-l-[6px] border-emerald-400 rounded-tl-[1.5rem]"></div>
                                                <div className="absolute bottom-0 right-0 w-12 h-12 border-b-[6px] border-r-[6px] border-emerald-400 rounded-br-[1.5rem]"></div>
                                                <div className="absolute w-full h-1 bg-gradient-to-r from-transparent via-emerald-400 to-transparent top-0 animate-scan shadow-[0_0_25px_emerald]"></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 md:p-12 rounded-[3rem] border border-slate-100 space-y-6 md:space-y-10 text-left shadow-sm">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Input Plat (Manual)</label>
                                            <input placeholder="BM 1234 XY" value={manualPlate} onChange={(e) => setManualPlate(e.target.value.toUpperCase())} className="w-full p-6 bg-slate-50 text-emerald-700 text-center rounded-[2rem] border-2 border-emerald-50 outline-none uppercase font-black text-3xl shadow-inner focus:bg-white focus:border-emerald-500 transition-all" />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Alasan / Keperluan</label>
                                            <textarea placeholder="Contoh: Tamu Manager, Antar Pupuk, Ke Kantor..." value={keteranganScan} onChange={(e) => setKeteranganScan(e.target.value)} className="w-full p-6 bg-slate-50 text-slate-700 rounded-[2rem] border-2 border-emerald-50 outline-none font-bold text-sm md:text-base h-24 md:h-32 focus:bg-white focus:border-emerald-500 transition-all" />
                                        </div>
                                        <button onClick={() => processScan()} disabled={isLoading} className="w-full bg-emerald-600 text-white p-6 md:p-8 rounded-[2rem] font-black text-xl shadow-xl hover:bg-emerald-700 transition-all active:scale-95 flex items-center justify-center gap-4">
                                            <Icon name="check-circle-2" size={28} />
                                            <span>{isLoading ? 'MEMPROSES...' : 'PROSES LOG AKSES'}</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {view === 'history' && (
                                <div className="space-y-8 md:space-y-12 animate-in fade-in duration-700">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                        <h2 className="text-3xl md:text-4xl font-black text-slate-800">Log Aktivitas</h2>
                                        <div className="relative w-full md:w-96">
                                            <Icon name="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-emerald-300" size={20} />
                                            <input placeholder="Cari Log..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-14 pr-6 py-4 border border-slate-100 bg-white rounded-[1.5rem] md:rounded-[2.5rem] outline-none font-bold text-sm shadow-sm" />
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2rem] md:rounded-[4rem] border border-slate-100 overflow-hidden shadow-sm">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left min-w-[800px]">
                                                <thead className="bg-emerald-50/50">
                                                    <tr>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest">Unit & Pemilik</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-center">Masuk</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-center">Keluar</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest">Keperluan</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-right">Otorisasi</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase())).map(l => (
                                                        <tr key={l.id} className="hover:bg-emerald-50/20 transition-all">
                                                            <td className="p-6 md:p-10">
                                                                <div className="font-black text-2xl md:text-3xl text-slate-800 uppercase tracking-tighter leading-none">{l.platNomor}</div>
                                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1.5">{l.namaPemilik}</div>
                                                            </td>
                                                            <td className="p-6 md:p-10 text-center">
                                                                <span className="text-xs md:text-sm font-black text-slate-600 block">{l.timestampMasuk?.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                                                                <span className="text-[10px] font-bold text-slate-400 block mt-1 uppercase">{l.timestampMasuk?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                            </td>
                                                            <td className="p-6 md:p-10 text-center">
                                                                {l.timestampKeluar ? (
                                                                    <>
                                                                        <span className="text-xs md:text-sm font-black text-slate-600 block">{l.timestampKeluar.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                                                                        <span className="text-[10px] font-bold text-slate-400 block mt-1 uppercase">{l.timestampKeluar.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                                    </>
                                                                ) : <span className="text-[10px] font-black text-emerald-600 italic uppercase">Sedang Di Kebun</span>}
                                                            </td>
                                                            <td className="p-6 md:p-10 font-bold text-[10px] md:text-xs text-slate-500 uppercase">{l.keterangan || "Akses Rutin"}</td>
                                                            <td className="p-6 md:p-10 text-right">
                                                                <span className={`px-4 py-2.5 rounded-xl md:rounded-2xl text-[10px] font-black tracking-widest uppercase ${l.status === 'AKTIF' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {l.status === 'AKTIF' ? 'AUTHORIZED' : 'FINISHED'}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'units' && (
                                <div className="space-y-8 md:space-y-12 animate-in fade-in duration-700">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                        <div className="text-left">
                                            <h2 className="text-3xl md:text-4xl font-black text-slate-800">Unit Terdaftar</h2>
                                            <p className="text-emerald-600 font-bold text-[10px] md:text-xs uppercase tracking-widest">Database Sei Rokan Afdeling VI</p>
                                        </div>
                                        <div className="relative w-full md:w-96">
                                            <Icon name="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-emerald-300" size={20} />
                                            <input placeholder="Cari Plat / Nama..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-white rounded-[1.5rem] md:rounded-[2.5rem] border border-slate-100 outline-none font-bold text-sm shadow-sm" />
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2rem] md:rounded-[4rem] border border-slate-100 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left min-w-[600px]">
                                                <thead className="bg-emerald-50/50">
                                                    <tr>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest">Plat & Unit</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-center">Registrasi</th>
                                                        <th className="p-6 md:p-10 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-right">QR Cadangan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {vehicles.filter(v => v.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || v.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase())).map(v => (
                                                        <tr key={v.id} className="hover:bg-emerald-50/20 transition-all">
                                                            <td className="p-6 md:p-10">
                                                                <div className="font-black text-2xl md:text-3xl text-slate-800 uppercase tracking-tighter leading-none">{v.platNomor}</div>
                                                                <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-1.5">{v.namaPemilik}</div>
                                                            </td>
                                                            <td className="p-6 md:p-10 text-center text-xs md:text-sm font-black text-slate-500">
                                                                {v.createdAt?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'})}
                                                            </td>
                                                            <td className="p-6 md:p-10 text-right">
                                                                <button onClick={() => setSelectedQR(v)} className="p-4 md:p-5 bg-emerald-50 text-emerald-600 rounded-2xl md:rounded-3xl hover:bg-emerald-600 hover:text-white transition-all shadow-sm">
                                                                    <Icon name="qr-code" size={24} />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
