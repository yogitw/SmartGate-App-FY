<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate - AFDELING VI SEI ROKAN</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smartgate-sei-rokan-v1";

        enableIndexedDbPersistence(db).catch((err) => {
            console.log("Persistence status:", err.code);
        });

        window.fb = { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFFFFF; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        ::-webkit-scrollbar { width: 0px; display: none; }
        #reader { border: none !important; }
        #reader video { border-radius: 2.5rem !important; object-fit: cover !important; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            const getIconName = (n) => {
                const map = {
                    'qr-code': 'QrCode', 'shield-check': 'ShieldCheck', 'car': 'Car', 'bike': 'Motorcycle',
                    'layout-dashboard': 'LayoutDashboard', 'clock-3': 'Clock3', 'plus-circle': 'PlusCircle',
                    'history': 'History', 'printer': 'Printer', 'search': 'Search', 'menu': 'Menu',
                    'check-circle-2': 'CheckCircle2', 'alert-circle': 'AlertCircle', 'map-pin': 'MapPin',
                    'database': 'Database', 'users': 'Users', 'x': 'X', 'info': 'Info'
                };
                return map[name] || name;
            };

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconData = window.lucide.icons[getIconName(name)];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size); svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24"); svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor"); svg.setAttribute("stroke-width", "2.5");
                        svg.setAttribute("stroke-linecap", "round"); svg.setAttribute("stroke-linejoin", "round");
                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([k, v]) => element.setAttribute(k, v));
                            svg.appendChild(element);
                        });
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size]);
            return <div ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        function App() {
            const { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged } = window.fb || {};
            
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedQR, setSelectedQR] = useState(null);
            
            const [manualPlate, setManualPlate] = useState('');
            const [keteranganScan, setKeteranganScan] = useState('');
            const scannerRef = useRef(null);

            useEffect(() => {
                if (!auth) return;
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                
                const unsubV = onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                
                return () => { unsubV(); unsubL(); };
            }, [user, db]);

            useEffect(() => {
                if (view === 'scan') {
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        config, 
                        (decodedText) => processScan(decodedText),
                        (errorMessage) => {}
                    ).catch(err => console.log("Camera error:", err));

                    return () => {
                        if (scannerRef.current) scannerRef.current.stop().catch(e => console.log(e));
                    };
                }
            }, [view]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const handleRegisterVehicle = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const formData = new FormData(e.target);
                const plat = formData.get('platNomor').toUpperCase().trim();
                const nama = formData.get('namaPemilik').trim();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), {
                        platNomor: plat, namaPemilik: nama, createdAt: Timestamp.now(), status: 'di_luar'
                    });
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${plat}`;
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl, date: new Date().toLocaleDateString('id-ID') });
                    showStatus(`Unit ${plat} Terdaftar!`);
                } catch (err) { 
                    showStatus("Error Simpan Data", "error"); 
                } finally { setIsLoading(false); }
            };

            const processScan = async (val) => {
                const plat = (val || manualPlate).toUpperCase().trim();
                if (!plat) {
                    showStatus("MASUKKAN PLAT NOMOR!", "error");
                    return;
                }
                
                setIsLoading(true);
                try {
                    const vDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat));
                    if (!vDoc.exists()) {
                        showStatus("KENDARAAN BELUM TERDAFTAR!", "error");
                        return;
                    }
                    const vData = vDoc.data();
                    
                    if (vData.status === 'di_luar') {
                        // Proses Masuk
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            platNomor: plat, 
                            namaPemilik: vData.namaPemilik, 
                            tipe: 'MASUK',
                            timestampMasuk: Timestamp.now(), 
                            status: 'AKTIF', 
                            lokasi: 'AFDELING VI',
                            keterangan: keteranganScan || "Akses Rutin"
                        });
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_dalam' });
                        showStatus("MASUK BERHASIL: " + plat);
                    } else {
                        // Proses Keluar
                        const active = logs.find(l => l.platNomor === plat && l.status === 'AKTIF');
                        if (active) {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', active.id), {
                                timestampKeluar: Timestamp.now(), 
                                status: 'SELESAI',
                                keteranganKeluar: keteranganScan || "Selesai Urusan"
                            });
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_luar' });
                            showStatus("KELUAR BERHASIL: " + plat);
                        }
                    }
                    
                    setManualPlate('');
                    setKeteranganScan('');
                    setView('dashboard');
                } catch (err) { 
                    console.error(err);
                    showStatus("Sistem Error", "error"); 
                } finally { setIsLoading(false); }
            };

            const filteredVehicles = vehicles.filter(v => 
                v.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || 
                v.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#F8FAFC]">
                    
                    {}
                    {selectedQR && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-10 text-center shadow-2xl relative animate-in zoom-in-95 duration-300">
                                <button onClick={() => setSelectedQR(null)} className="absolute top-8 right-8 text-slate-300 hover:text-rose-500 transition-colors">
                                    <Icon name="x" size={28} />
                                </button>
                                <div className="bg-emerald-50 p-8 rounded-[2.5rem] border-2 border-dashed border-emerald-100 mb-8 inline-block">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${selectedQR.platNomor}`} className="w-48 h-48 rounded-xl" alt="QR" />
                                </div>
                                <div className="mb-8">
                                    <h3 className="text-4xl font-black text-slate-900 leading-tight">{selectedQR.platNomor}</h3>
                                    <p className="text-emerald-600 font-bold uppercase text-xs tracking-widest mt-1">{selectedQR.namaPemilik}</p>
                                </div>
                                <button onClick={() => setSelectedQR(null)} className="w-full bg-slate-100 text-slate-500 p-5 rounded-[1.5rem] font-bold hover:bg-slate-200 transition-all">TUTUP</button>
                            </div>
                        </div>
                    )}

                    {}
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-80 bg-white border-r border-slate-100 transition-all z-50 p-8 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12">
                            <div className="h-14 w-14 bg-gradient-to-br from-emerald-600 to-green-600 rounded-[1.25rem] flex items-center justify-center text-white shadow-xl shadow-emerald-100">
                                <Icon name="qr-code" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold text-slate-800 leading-tight">SmartGate</h1>
                                <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Afdeling VI</p>
                            </div>
                        </div>

                        <nav className="space-y-2 flex-1">
                            {[
                                {id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard'},
                                {id: 'scan', icon: 'shield-check', label: 'Scan Akses Satpam'},
                                {id: 'register', icon: 'plus-circle', label: 'Registrasi Unit'},
                                {id: 'units', icon: 'database', label: 'Data Unit Terdaftar'},
                                {id: 'history', icon: 'history', label: 'Log Aktivitas'}
                            ].map(item => (
                                <button key={item.id} onClick={() => {setView(item.id); setIsSidebarOpen(false)}} className={`flex items-center space-x-4 w-full p-4 rounded-2xl font-bold text-sm transition-all ${view === item.id ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}>
                                    <Icon name={item.icon} size={22} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="mt-auto bg-emerald-50 p-5 rounded-[2rem] border border-emerald-100 flex items-center gap-4">
                            <div className="h-10 w-10 rounded-full bg-white flex items-center justify-center text-emerald-600 font-black text-xs border">VI</div>
                            <div className="overflow-hidden">
                                <p className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Station</p>
                                <p className="text-xs font-bold text-emerald-900 truncate uppercase">KEBUN SEI ROKAN</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 relative overflow-y-auto h-screen">
                        <header className="md:hidden flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><Icon name="menu" /></button>
                            <span className="font-black text-emerald-600 text-[10px] tracking-widest uppercase">AFDELING VI</span>
                        </header>

                        {statusMsg && (
                            <div className={`fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] text-white font-bold shadow-2xl z-[100] flex items-center gap-4 animate-bounce ${statusMsg.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                <Icon name={statusMsg.type === 'success' ? 'check-circle-2' : 'alert-circle'} size={20} />
                                <span className="text-sm">{statusMsg.text}</span>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-emerald-600 p-12 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden group">
                                    <div className="relative z-10">
                                        <h2 className="text-4xl font-black mb-4 tracking-tight text-white">Status Gerbang</h2>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10">
                                                <p className="text-[10px] font-black opacity-60 uppercase mb-2">Total Unit Terdaftar</p>
                                                <p className="text-4xl font-black">{vehicles.length}</p>
                                            </div>
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10">
                                                <p className="text-[10px] font-black opacity-60 uppercase mb-2">Unit Di Dalam Kebun</p>
                                                <p className="text-4xl font-black text-white">{vehicles.filter(v=>v.status==='di_dalam').length}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <Icon name="shield-check" size={300} className="absolute -right-16 -bottom-16 opacity-10 rotate-12" />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={()=>setView('scan')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl transition-all group">
                                        <div className="h-20 w-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all"><Icon name="shield-check" size={40} /></div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Mulai Scan</h3>
                                            <p className="text-emerald-600 font-bold text-sm uppercase">Otoritas Security</p>
                                        </div>
                                    </button>
                                    <button onClick={()=>setView('history')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl transition-all group">
                                        <div className="h-20 w-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all"><Icon name="history" size={40} /></div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Log Aktivitas</h3>
                                            <p className="text-slate-400 font-bold text-sm">Lihat Keluar Masuk</p>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'scan' && (
                            <div className="max-w-2xl mx-auto space-y-8 text-center animate-in zoom-in-95 pb-20">
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-black text-slate-800">Pindai Akses</h2>
                                    <p className="text-emerald-600 font-bold uppercase text-[10px] tracking-widest">Input Plat & Keterangan</p>
                                </div>

                                <div className="bg-slate-900 aspect-square rounded-[4rem] p-4 relative overflow-hidden border-[15px] border-white shadow-2xl">
                                    <div id="reader" className="w-full h-full rounded-[3rem] overflow-hidden"></div>
                                    <div className="absolute inset-0 pointer-events-none p-12">
                                        <div className="w-full h-full border-2 border-emerald-500/20 rounded-[3rem] relative">
                                            <div className="absolute top-0 left-0 w-16 h-16 border-t-[6px] border-l-[6px] border-emerald-400 rounded-tl-[2rem]"></div>
                                            <div className="absolute bottom-0 right-0 w-16 h-16 border-b-[6px] border-r-[6px] border-emerald-400 rounded-br-[2rem]"></div>
                                            <div className="absolute w-full h-1 bg-gradient-to-r from-transparent via-emerald-400 to-transparent top-0 animate-scan shadow-[0_0_20px_emerald]"></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 space-y-6 text-left">
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Input Plat Nomor Manual</label>
                                        <input placeholder="BM 1234 XY" value={manualPlate} onChange={(e) => setManualPlate(e.target.value.toUpperCase())} className="w-full p-6 bg-slate-50 text-emerald-700 text-center rounded-[2rem] border-2 border-emerald-50 outline-none uppercase font-black text-2xl focus:bg-white focus:border-emerald-500 transition-all" />
                                    </div>

                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 block">Keperluan / Keterangan (Penting)</label>
                                        <textarea placeholder="Contoh: Tamu Manager, Antar Pupuk, dsb..." value={keteranganScan} onChange={(e) => setKeteranganScan(e.target.value)} className="w-full p-6 bg-slate-50 text-slate-700 rounded-[2rem] border-2 border-emerald-50 outline-none font-bold text-sm focus:bg-white focus:border-emerald-500 transition-all resize-none h-24" />
                                    </div>
                                    
                                    <button onClick={() => processScan()} disabled={isLoading} className="w-full bg-emerald-600 text-white p-6 rounded-[2rem] font-black text-lg shadow-xl hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-4">
                                        <Icon name="check-circle-2" />
                                        <span>{isLoading ? 'MEMPROSES...' : 'PROSES LOG AKSES'}</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {}
                        {view === 'history' && (
                            <div className="space-y-10 animate-in fade-in duration-700">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                    <h2 className="text-3xl font-black text-slate-800">Log Aktivitas</h2>
                                    <div className="relative w-full md:w-96">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-200" size={20} />
                                        <input placeholder="Cari Log..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-16 pr-8 py-5 border border-slate-100 bg-white rounded-3xl outline-none focus:border-emerald-500 font-bold text-sm shadow-sm transition-all" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-[3.5rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-emerald-50/50">
                                                <tr>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-widest">Unit (Plat & Nama)</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-widest text-center">Masuk</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-widest text-center">Keluar</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-widest">Keperluan</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-widest text-right">Otorisasi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase())).map(l => (
                                                    <tr key={l.id} className="hover:bg-emerald-50/20 transition-all">
                                                        <td className="p-8">
                                                            <div className="font-black text-2xl text-slate-800 uppercase tracking-tighter leading-none">{l.platNomor}</div>
                                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{l.namaPemilik}</div>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            <span className="text-xs font-black text-slate-600 block">{l.timestampMasuk?.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                                                            <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampMasuk?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            {l.timestampKeluar ? (
                                                                <>
                                                                    <span className="text-xs font-black text-slate-600 block">{l.timestampKeluar.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                                                                    <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampKeluar.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                                </>
                                                            ) : <span className="text-[10px] font-black text-emerald-600 italic">Di Kebun</span>}
                                                        </td>
                                                        <td className="p-8">
                                                            <div className="flex items-center gap-2">
                                                                <Icon name="info" size={14} className="text-emerald-500" />
                                                                <div className="text-[11px] font-bold text-slate-500 uppercase leading-relaxed max-w-[150px]">{l.keterangan || "Akses Rutin"}</div>
                                                            </div>
                                                        </td>
                                                        <td className="p-8 text-right">
                                                            <span className={`px-4 py-2 rounded-xl text-[10px] font-black tracking-widest uppercase ${l.status === 'AKTIF' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>
                                                                {l.status === 'AKTIF' ? 'AUTHORIZED' : 'FINISHED'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {view === 'units' && (
                            <div className="space-y-8 animate-in fade-in duration-700">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="text-left">
                                        <h2 className="text-3xl font-black text-slate-800">Data Unit Terdaftar</h2>
                                        <p className="text-emerald-600 font-bold text-xs uppercase tracking-widest">Database Seluruh Kendaraan</p>
                                    </div>
                                    <div className="relative w-full md:w-96">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-300" size={20} />
                                        <input placeholder="Cari Plat / Nama..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-16 pr-8 py-5 bg-white rounded-3xl border border-slate-100 outline-none focus:border-emerald-500 font-bold text-sm shadow-sm" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-emerald-50/50">
                                                <tr>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-500 tracking-widest">Plat Nomor & Nama Unit</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-center">Tanggal Daftar</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-500 tracking-widest text-right">Aksi QR</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredVehicles.map(v => (
                                                    <tr key={v.id} className="hover:bg-emerald-50/20 transition-all group">
                                                        <td className="p-8">
                                                            <div className="font-black text-2xl text-slate-800 uppercase tracking-tighter">{v.platNomor}</div>
                                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{v.namaPemilik}</div>
                                                        </td>
                                                        <td className="p-8 text-center text-xs font-bold text-slate-500">
                                                            {v.createdAt?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'})}
                                                        </td>
                                                        <td className="p-8 text-right">
                                                            <button onClick={() => setSelectedQR(v)} className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl hover:bg-emerald-600 hover:text-white transition-all shadow-sm"><Icon name="qr-code" size={20} /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-2xl mx-auto animate-in slide-in-from-bottom-12">
                                {!registeredQR ? (
                                    <div className="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-xl text-left">
                                        <h2 className="text-3xl font-black text-slate-800 mb-8">Registrasi Unit Baru</h2>
                                        <form onSubmit={handleRegisterVehicle} className="space-y-8">
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2 block">Nomor Plat</label>
                                                <input name="platNomor" required placeholder="B 1234 XYZ" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-black uppercase outline-none focus:bg-white focus:border-emerald-500 transition-all text-3xl shadow-inner" />
                                            </div>
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2 block">Nama Pemilik / Unit</label>
                                                <input name="namaPemilik" required placeholder="NAMA UNIT" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-bold uppercase outline-none focus:bg-white focus:border-emerald-500 transition-all text-lg shadow-inner" />
                                            </div>
                                            <button disabled={isLoading} className="w-full bg-emerald-600 text-white p-7 rounded-[2rem] font-black text-lg shadow-2xl hover:bg-emerald-700 transition-all active:scale-95">{isLoading ? 'Menyimpan...' : 'SIMPAN & GENERATE QR'}</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-white p-12 rounded-[4rem] border-t-[15px] border-emerald-600 text-center space-y-10 shadow-2xl">
                                        <div className="bg-emerald-50 p-10 rounded-[3rem] inline-block border-2 border-dashed border-emerald-100">
                                            <img src={registeredQR.qrUrl} className="mx-auto w-64 h-64 rounded-2xl shadow-lg border-4 border-white" />
                                        </div>
                                        <div>
                                            <p className="text-emerald-600 font-black text-xs uppercase tracking-widest mb-2">Registrasi Berhasil</p>
                                            <h3 className="text-6xl font-black text-slate-900">{registeredQR.platNomor}</h3>
                                            <p className="text-slate-500 font-bold uppercase mt-2">{registeredQR.namaPemilik}</p>
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <button onClick={() => {
                                                const win = window.open('', '_blank');
                                                win.document.write(`<html><head><title>Stiker Akses</title><style>body{font-family:sans-serif;text-align:center;padding:50px}.card{border:10px solid #16a34a;padding:40px;border-radius:40px;display:inline-block}.plat{font-size:60px;font-weight:900;margin:20px 0}</style></head><body onload="window.print();window.close()"><div class="card"><div style="background:#16a34a;color:white;padding:10px;border-radius:10px;font-weight:bold;margin-bottom:20px">AFDELING VI SEI ROKAN</div><img src="${registeredQR.qrUrl}" width="300"><div class="plat">${registeredQR.platNomor}</div><div style="font-weight:bold;text-transform:uppercase">${registeredQR.namaPemilik}</div></div></body></html>`);
                                            }} className="flex-1 bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 shadow-xl"><Icon name="printer" size={24} /> CETAK STIKER</button>
                                            <button onClick={()=>setRegisteredQR(null)} className="flex-1 bg-slate-100 p-6 rounded-[2rem] font-black text-slate-600 hover:bg-slate-200 transition-all">SELESAI</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
