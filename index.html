<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Pro - Virtual Guard System</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smartgate-pro-v1";

        window.fb = { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = ''; 
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size);
                        svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24");
                        svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor");
                        svg.setAttribute("stroke-width", "2.5");
                        svg.setAttribute("stroke-linecap", "round");
                        svg.setAttribute("stroke-linejoin", "round");
                        svg.setAttribute("class", `lucide lucide-${name} ${className}`);
                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
                            svg.appendChild(element);
                        });
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <div ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        function App() {
            const { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged } = window.fb || {};
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            useEffect(() => {
                if (!auth) return;
                signInAnonymously(auth).catch(err => {
                    if(err.code === 'auth/configuration-not-found') {
                        showStatus("Aktifkan 'Anonymous Auth' di Firebase Console!", "error");
                    }
                });
                return onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const unsubV = onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                return () => { unsubV(); unsubL(); };
            }, [user, db]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 5000);
            };

            const handleRegisterVehicle = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const formData = new FormData(e.target);
                const plat = formData.get('platNomor').toUpperCase().trim();
                const nama = formData.get('namaPemilik').trim();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), {
                        platNomor: plat, namaPemilik: nama, createdAt: Timestamp.now(), status: 'di_luar'
                    });
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${plat}`;
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl, date: new Date().toLocaleDateString('id-ID') });
                    showStatus(`Kendaraan ${plat} Terdaftar!`);
                } catch (err) { showStatus("Gagal menyimpan ke Database", "error"); }
                finally { setIsLoading(false); }
            };

            const processScan = async (val) => {
                if (!val) return;
                setIsLoading(true);
                const plat = val.toUpperCase().trim();
                try {
                    const vDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat));
                    if (!vDoc.exists()) { showStatus("NOMOR PLAT TIDAK TERDAFTAR!", "error"); return; }
                    const vData = vDoc.data();
                    if (vData.status === 'di_luar') {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            platNomor: plat, namaPemilik: vData.namaPemilik, tipe: 'MASUK',
                            timestampMasuk: Timestamp.now(), status: 'AKTIF'
                        });
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_dalam' });
                        showStatus("WELCOME: " + plat);
                    } else {
                        const active = logs.find(l => l.platNomor === plat && l.status === 'AKTIF');
                        if (active) {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', active.id), {
                                timestampKeluar: Timestamp.now(), status: 'SELESAI'
                            });
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_luar' });
                            showStatus("GOODBYE: " + plat);
                        }
                    }
                    setView('dashboard');
                } catch (err) { showStatus("Error Sistem", "error"); }
                finally { setIsLoading(false); }
            };

            const handlePrint = () => {
                const win = window.open('', '_blank');
                win.document.write(`
                    <html><head><title>Print Stiker - ${registeredQR.platNomor}</title>
                    <style>
                        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; }
                        .s { border: 4px solid #000; padding: 25px; border-radius: 30px; text-align: center; width: 380px; }
                        .p { font-size: 50px; font-weight: 900; margin: 15px 0; font-family: monospace; }
                        .n { font-size: 18px; font-weight: bold; color: #444; text-transform: uppercase; border-top: 1px solid #eee; padding-top: 10px; }
                    </style></head>
                    <body onload="window.print(); window.close();">
                        <div class="s">
                            <div style="font-weight:900; letter-spacing:1px; color:#666; font-size:12px;">SMART GATE ACCESS CARD</div>
                            <img src="${registeredQR.qrUrl}" style="width:200px; margin: 15px 0;" />
                            <div class="p">${registeredQR.platNomor}</div>
                            <div class="n">${registeredQR.namaPemilik}</div>
                        </div>
                    </body></html>
                `);
            };

            const filteredLogs = logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || l.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {}
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-72 bg-white border-r transition-transform z-50 p-6 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-3 mb-10">
                            <div className="h-12 w-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="qr-code" /></div>
                            <h1 className="text-xl font-bold tracking-tight">SmartGate</h1>
                        </div>
                        <nav className="space-y-2 flex-1">
                            {[{id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard'}, {id: 'scan', icon: 'camera', label: 'Scan QR'}, {id: 'register', icon: 'plus-circle', label: 'Daftar Baru'}, {id: 'history', icon: 'history', label: 'Riwayat'}].map(item => (
                                <button key={item.id} onClick={() => {setView(item.id); setIsSidebarOpen(false)}} className={`flex items-center space-x-3 w-full p-4 rounded-2xl font-bold text-sm transition-all ${view === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                                    <Icon name={item.icon} size={20} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 bg-slate-50 rounded-2xl text-[10px] text-slate-400 font-bold uppercase text-center border">ID: {user?.uid?.substring(0, 8) || 'CONNECTING...'}</div>
                    </aside>

                    {}
                    <main className="flex-1 p-6 md:p-10 relative">
                        <header className="md:hidden flex justify-between items-center mb-6">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 bg-white border rounded-xl shadow-sm"><Icon name="menu" /></button>
                            <span className="font-bold text-indigo-600 uppercase text-xs tracking-widest">Operator Panel</span>
                        </header>

                        {statusMsg && (
                            <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-white font-bold shadow-2xl z-[100] flex items-center gap-3 animate-bounce ${statusMsg.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                <Icon name={statusMsg.type === 'success' ? 'check-circle' : 'alert-triangle'} size={18} /> {statusMsg.text}
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                                    <h2 className="text-2xl font-bold relative z-10">Sistem Gate Aktif</h2>
                                    <div className="grid grid-cols-2 gap-4 mt-6 relative z-10">
                                        <div className="bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/10 text-center">
                                            <p className="text-xs opacity-70 uppercase font-bold tracking-widest mb-1">Terdaftar</p>
                                            <p className="text-3xl font-bold">{vehicles.length}</p>
                                        </div>
                                        <div className="bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/10 text-center">
                                            <p className="text-xs opacity-70 uppercase font-bold tracking-widest mb-1">Parkir</p>
                                            <p className="text-3xl font-bold text-emerald-300">{vehicles.filter(v=>v.status==='di_dalam').length}</p>
                                        </div>
                                    </div>
                                    <Icon name="car" size={150} className="absolute -right-10 -bottom-10 opacity-10 rotate-12" />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button onClick={()=>setView('scan')} className="p-8 bg-white rounded-[2rem] border flex items-center gap-4 hover:shadow-lg transition-all font-bold">
                                        <div className="h-12 w-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600"><Icon name="camera" /></div>
                                        Scan QR Kendaraan
                                    </button>
                                    <button onClick={()=>setView('register')} className="p-8 bg-white rounded-[2rem] border flex items-center gap-4 hover:shadow-lg transition-all font-bold">
                                        <div className="h-12 w-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600"><Icon name="plus-circle" /></div>
                                        Daftar Baru
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'scan' && (
                            <div className="max-w-md mx-auto space-y-6 text-center animate-in zoom-in-95">
                                <h2 className="text-2xl font-bold">Pindai QR Code</h2>
                                <div className="bg-slate-900 aspect-square rounded-[3rem] p-10 relative overflow-hidden border-[8px] border-white shadow-2xl">
                                    <div className="w-full h-full border-2 border-indigo-500/30 rounded-2xl relative flex items-center justify-center">
                                        <div className="absolute w-full h-1 bg-indigo-400 top-0 animate-scan shadow-[0_0_15px_indigo]"></div>
                                        <Icon name="camera" size={100} className="text-white/5" />
                                    </div>
                                    <input autoFocus placeholder="Ketik Plat / Scan..." onKeyPress={e => e.key === 'Enter' && processScan(e.target.value)} className="absolute bottom-10 left-1/2 -translate-x-1/2 w-[80%] p-4 bg-white/10 text-white text-center rounded-xl border border-white/20 outline-none uppercase font-bold text-xl placeholder:text-white/20" />
                                </div>
                                <button onClick={()=>setView('dashboard')} className="text-slate-400 font-bold hover:text-indigo-600 uppercase text-xs tracking-widest">Batal</button>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-md mx-auto animate-in slide-in-from-bottom-8">
                                {!registeredQR ? (
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                                        <div className="flex items-center gap-3 mb-8">
                                            <Icon name="plus-circle" className="text-indigo-600" />
                                            <h2 className="text-xl font-bold">Pendaftaran</h2>
                                        </div>
                                        <form onSubmit={handleRegisterVehicle} className="space-y-6">
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Nomor Plat</label>
                                                <input name="platNomor" required placeholder="B 1234 XYZ" className="w-full p-5 bg-slate-50 rounded-2xl border font-bold uppercase outline-none focus:border-indigo-500 transition-all text-xl" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Nama Pemilik</label>
                                                <input name="namaPemilik" required placeholder="NAMA LENGKAP" className="w-full p-5 bg-slate-50 rounded-2xl border font-bold uppercase outline-none focus:border-indigo-500 transition-all" />
                                            </div>
                                            <button disabled={isLoading} className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all">{isLoading ? 'Processing...' : 'SIMPAN & BUAT QR'}</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-white p-8 rounded-[3rem] border text-center space-y-6 shadow-2xl animate-in zoom-in-90">
                                        <div className="bg-slate-50 p-6 rounded-3xl inline-block border-2 border-dashed"><img src={registeredQR.qrUrl} className="mx-auto w-48 h-48 rounded-lg shadow-sm" /></div>
                                        <div>
                                            <p className="text-indigo-600 font-bold text-xs uppercase mb-1">Berhasil</p>
                                            <h3 className="text-4xl font-black tracking-tighter">{registeredQR.platNomor}</h3>
                                            <p className="text-slate-500 font-bold uppercase mt-1">{registeredQR.namaPemilik}</p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={handlePrint} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg"><Icon name="printer" size={20} /> CETAK STIKER</button>
                                            <button onClick={()=>setRegisteredQR(null)} className="w-full bg-slate-100 p-5 rounded-2xl font-bold text-slate-600">SELESAI</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <h2 className="text-2xl font-bold">Riwayat Akses</h2>
                                    <div className="relative w-full md:w-72">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                                        <input placeholder="Cari Plat..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 border rounded-2xl outline-none focus:border-indigo-500 font-bold text-sm" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b">
                                                <tr>
                                                    <th className="p-6 text-[10px] font-black uppercase opacity-50 tracking-widest">Identitas</th>
                                                    <th className="p-6 text-[10px] font-black uppercase opacity-50 tracking-widest text-center">Masuk</th>
                                                    <th className="p-6 text-[10px] font-black uppercase opacity-50 tracking-widest text-center">Keluar</th>
                                                    <th className="p-6 text-[10px] font-black uppercase opacity-50 tracking-widest text-right">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredLogs.map(l => (
                                                    <tr key={l.id} className="hover:bg-indigo-50/20 transition-colors">
                                                        <td className="p-6"><div className="font-black text-lg text-slate-800">{l.platNomor}</div><div className="text-[10px] uppercase font-bold text-slate-400 mt-1">{l.namaPemilik}</div></td>
                                                        <td className="p-6 text-center text-xs font-bold text-slate-600">{l.timestampMasuk?.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td>
                                                        <td className="p-6 text-center text-xs font-bold text-slate-600">{l.timestampKeluar ? l.timestampKeluar.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '-'}</td>
                                                        <td className="p-6 text-right"><span className={`px-4 py-2 rounded-xl text-[9px] font-black tracking-widest uppercase ${l.status === 'AKTIF' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{l.status === 'AKTIF' ? 'ACTIVE' : 'EXIT'}</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {filteredLogs.length === 0 && <div className="p-20 text-center text-slate-300 font-bold uppercase tracking-widest">Data Kosong</div>}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```

Selamat! Sistem Anda sudah resmi online. Silakan tes dengan mendaftarkan satu kendaraan, dan Anda akan melihat datanya muncul secara ajaib di dashboard!
