        const firebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smartgate-sei-rokan-v1";

        window.fb = { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFFFF;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan { animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(22, 163, 74, 0.1);
        }

        ::-webkit-scrollbar { width: 0px; display: none; }

        #reader__dashboard_section_csr button {
            background-color: #16a34a !important;
            color: white !important;
            padding: 10px 20px !important;
            border-radius: 12px !important;
            font-weight: bold !important;
            border: none !important;
            margin-top: 10px !important;
        }
        #reader video {
            border-radius: 2rem !important;
            object-fit: cover !important;

    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            const getIconName = (n) => {
                const map = {
                    'qr-code': 'QrCode',
                    'shield-check': 'ShieldCheck',
                    'car': 'Car',
                    'bike': 'Motorcycle',
                    'layout-dashboard': 'LayoutDashboard',
                    'clock-3': 'Clock3',
                    'plus-circle': 'PlusCircle',
                    'history': 'History',
                    'printer': 'Printer',
                    'search': 'Search',
                    'menu': 'Menu',
                    'check-circle-2': 'CheckCircle2',
                    'alert-circle': 'AlertCircle',
                    'map-pin': 'MapPin'
                };
                return map[n] || n;
            };

            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const cleanName = getIconName(name);
                        const iconData = window.lucide.icons[cleanName];
                        
                        if (iconData) {
                            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                            svg.setAttribute("width", size);
                            svg.setAttribute("height", size);
                            svg.setAttribute("viewBox", "0 0 24 24");
                            svg.setAttribute("fill", "none");
                            svg.setAttribute("stroke", "currentColor");
                            svg.setAttribute("stroke-width", "2.5");
                            svg.setAttribute("stroke-linecap", "round");
                            svg.setAttribute("stroke-linejoin", "round");
                            svg.setAttribute("class", `lucide lucide-${name} ${className}`);
                            
                            iconData.forEach(([tag, attrs]) => {
                                const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                                Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
                                svg.appendChild(element);
                            });
                            iconRef.current.appendChild(svg);
                        }
                    }
                };

                renderIcon();
                const timer = setTimeout(renderIcon, 500);
                return () => clearTimeout(timer);
            }, [name, size, className]);

            return <div ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        function App() {
            const { auth, db, appId, Timestamp, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged } = window.fb || {};
            
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const scannerRef = useRef(null);

            useEffect(() => {
                if (!auth) return;
                signInAnonymously(auth).catch(err => {
                    if (err.code === 'auth/configuration-not-found') {
                        showStatus("Aktifkan 'Anonymous Auth' di Firebase!", "error");
                    }
                });
                return onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                
                const unsubV = onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                
                return () => { unsubV(); unsubL(); };
            }, [user, db]);

            // Logika Menghidupkan Kamera
            useEffect(() => {
                if (view === 'scan') {
                    const html5QrCode = new Html5Qrcode("reader");
                    const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        qrConfig,
                        (decodedText) => {
                            processScan(decodedText);
                            html5QrCode.stop();
                        },
                        (errorMessage) => {}
                    ).catch(err => {
                        console.error("Gagal kamera:", err);
                    });

                    return () => {
                        if (html5QrCode.isScanning) {
                            html5QrCode.stop().catch(e => console.log(e));
                        }
                    };
                }
            }, [view]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const handleRegisterVehicle = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const formData = new FormData(e.target);
                const plat = formData.get('platNomor').toUpperCase().trim();
                const nama = formData.get('namaPemilik').trim();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), {
                        platNomor: plat, namaPemilik: nama, createdAt: Timestamp.now(), status: 'di_luar'
                    });
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${plat}`;
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl, date: new Date().toLocaleDateString('id-ID') });
                    showStatus(`Kendaraan ${plat} Berhasil Terdaftar!`);
                } catch (err) { 
                    showStatus("Gagal simpan ke DB. Cek Rules Firestore!", "error"); 
                } finally { setIsLoading(false); }
            };

            const processScan = async (val) => {
                if (!val) return;
                setIsLoading(true);
                const plat = val.toUpperCase().trim();
                try {
                    const vDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat));
                    if (!vDoc.exists()) {
                        showStatus("KENDARAAN BELUM TERDAFTAR!", "error");
                        return;
                    }
                    const vData = vDoc.data();
                    if (vData.status === 'di_luar') {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            platNomor: plat, namaPemilik: vData.namaPemilik, tipe: 'MASUK',
                            timestampMasuk: Timestamp.now(), status: 'AKTIF', lokasi: 'AFDELING VI'
                        });
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_dalam' });
                        showStatus("SELAMAT DATANG: " + plat);
                    } else {
                        const active = logs.find(l => l.platNomor === plat && l.status === 'AKTIF');
                        if (active) {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', active.id), {
                                timestampKeluar: Timestamp.now(), status: 'SELESAI'
                            });
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { status: 'di_luar' });
                            showStatus("BERHASIL KELUAR: " + plat);
                        }
                    }
                    setView('dashboard');
                } catch (err) { showStatus("Error Sistem. Cek Koneksi!", "error"); }
                finally { setIsLoading(false); }
            };

            const handlePrint = () => {
                const win = window.open('', '_blank');
                win.document.write(`
                    <html><head><title>Stiker Akses - ${registeredQR.platNomor}</title>
                    <style>
                        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; background: #fff; }
                        .card { border: 10px solid #065f46; padding: 40px; border-radius: 50px; text-align: center; width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
                        .tag { background: #059669; color: #fff; display: inline-block; padding: 8px 25px; border-radius: 15px; font-weight: 900; font-size: 14px; letter-spacing: 3px; margin-bottom: 25px; }
                        .plat { font-size: 70px; font-weight: 900; margin: 15px 0; font-family: 'Courier New', monospace; border-top: 4px solid #eee; border-bottom: 4px solid #eee; padding: 15px 0; color: #064e3b; }
                        .owner { font-size: 24px; font-weight: 800; color: #333; text-transform: uppercase; margin-top: 10px; }
                        .id { font-size: 11px; color: #999; margin-top: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
                    </style></head>
                    <body onload="window.print(); window.close();">
                        <div class="card">
                            <div class="tag">AFDELING VI - SEI ROKAN</div>
                            <div><img src="${registeredQR.qrUrl}" style="width:260px;" /></div>
                            <div class="plat">${registeredQR.platNomor}</div>
                            <div class="owner">${registeredQR.namaPemilik}</div>
                            <div class="id">SMARTGATE SYSTEM • KEBUN SEI ROKAN • ${registeredQR.date}</div>
                        </div>
                    </body></html>
                `);
            };

            const filteredLogs = logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || l.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden bg-white">
                    
                    {/* Sidebar */}
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-80 bg-white border-r border-slate-100 transition-all duration-500 z-50 p-8 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12">
                            <div className="h-14 w-14 bg-gradient-to-br from-emerald-600 to-green-600 rounded-[1.25rem] flex items-center justify-center text-white shadow-xl shadow-emerald-100">
                                <Icon name="qr-code" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold tracking-tight text-slate-800 leading-none">SmartGate</h1>
                                <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mt-1">Virtual Guard</p>
                            </div>
                        </div>

                        <nav className="space-y-3 flex-1">
                            {[
                                {id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard Overview'},
                                {id: 'scan', icon: 'shield-check', label: 'Scan Akses Satpam'},
                                {id: 'register', icon: 'car', label: 'Registrasi Unit'},
                                {id: 'history', icon: 'history', label: 'Log Aktivitas'}
                            ].map(item => (
                                <button 
                                    key={item.id} 
                                    onClick={() => {setView(item.id); setIsSidebarOpen(false)}} 
                                    className={`flex items-center space-x-4 w-full p-4 rounded-2xl font-bold text-sm transition-all duration-300 ${view === item.id ? 'bg-emerald-600 text-white shadow-2xl shadow-emerald-200' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}
                                >
                                    <Icon name={item.icon} size={22} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto bg-emerald-50 p-5 rounded-[2rem] border border-emerald-100 flex items-center gap-4">
                            <div className="h-10 w-10 rounded-full bg-white shadow-sm flex items-center justify-center text-emerald-600 font-black text-xs border uppercase">VI</div>
                            <div className="overflow-hidden text-left">
                                <p className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest leading-none mb-1">Active Station</p>
                                <p className="text-xs font-bold text-emerald-900 truncate uppercase">AFDELING VI SEI ROKAN</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 relative overflow-y-auto h-screen bg-[#F8FAFC]">
                        <header className="md:hidden flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><Icon name="menu" /></button>
                            <span className="font-black text-emerald-600 text-[10px] tracking-[0.2em] uppercase">AFDELING VI SEI ROKAN</span>
                        </header>

                        {statusMsg && (
                            <div className={`fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] text-white font-bold shadow-2xl z-[100] flex items-center gap-4 animate-bounce ${statusMsg.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                <Icon name={statusMsg.type === 'success' ? 'check-circle-2' : 'alert-circle'} size={20} />
                                <span className="text-sm">{statusMsg.text}</span>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <div className="bg-emerald-600 p-12 rounded-[3.5rem] text-white shadow-2xl shadow-emerald-100 relative overflow-hidden group">
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Icon name="map-pin" size={20} className="text-emerald-100" />
                                            <span className="font-bold text-sm tracking-widest uppercase text-emerald-100">Pos Penjagaan Sei Rokan</span>
                                        </div>
                                        <h2 className="text-4xl font-black mb-4 tracking-tight">Gerbang Online</h2>
                                        <p className="text-emerald-50 font-medium max-w-lg mb-10 leading-relaxed opacity-80">Sistem keamanan cerdas untuk monitoring akses kendaraan di area Kebun Sei Rokan - Afdeling VI.</p>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10">
                                                <p className="text-[10px] font-black opacity-60 uppercase tracking-[0.2em] mb-2">Total Terdaftar</p>
                                                <p className="text-4xl font-black">{vehicles.length}</p>
                                            </div>
                                            <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md border border-white/10">
                                                <p className="text-[10px] font-black opacity-60 uppercase tracking-[0.2em] mb-2">Unit Di Dalam</p>
                                                <p className="text-4xl font-black text-white">{vehicles.filter(v=>v.status==='di_dalam').length}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <Icon name="shield-check" size={300} className="absolute -right-16 -bottom-16 opacity-10 rotate-12" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={()=>setView('scan')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl hover:-translate-y-1 transition-all group">
                                        <div className="h-20 w-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="shield-check" size={40} /></div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Scan & Akses</h3>
                                            <p className="text-emerald-600 font-bold text-sm uppercase tracking-tighter">Otoritas Security</p>
                                        </div>
                                    </button>
                                    <button onClick={()=>setView('register')} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 hover:shadow-xl hover:-translate-y-1 transition-all group">
                                        <div className="h-20 w-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner flex flex-col items-center gap-1">
                                            <Icon name="car" size={24} />
                                            <Icon name="bike" size={20} />
                                        </div>
                                        <div className="text-left">
                                            <h3 className="text-2xl font-black text-slate-800">Registrasi Unit</h3>
                                            <p className="text-slate-400 font-bold text-sm">Pendaftaran Kendaraan</p>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'scan' && (
                            <div className="max-w-2xl mx-auto space-y-8 text-center animate-in zoom-in-95 duration-500 pb-20">
                                <div className="space-y-2">
                                    <div className="bg-emerald-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-600 border border-emerald-100">
                                        <Icon name="shield-check" size={32} />
                                    </div>
                                    <h2 className="text-3xl font-black text-slate-800">Arahkan QR Ke Kamera</h2>
                                    <p className="text-emerald-600 font-bold uppercase text-[10px] tracking-[0.3em]">Otoritas Security Afdeling VI</p>
                                </div>
                                
                                <div className="bg-slate-900 aspect-square rounded-[4rem] p-4 relative overflow-hidden border-[15px] border-white shadow-2xl shadow-emerald-100">
                                    {/* Video Container */}
                                    <div id="reader" className="w-full h-full rounded-[3rem] overflow-hidden"></div>
                                    
                                    {/* Laser Overlay */}
                                    <div className="absolute inset-0 pointer-events-none p-12">
                                        <div className="w-full h-full border-2 border-emerald-500/20 rounded-[3rem] relative">
                                            <div className="absolute top-0 left-0 w-16 h-16 border-t-[6px] border-l-[6px] border-emerald-400 rounded-tl-[2rem]"></div>
                                            <div className="absolute top-0 right-0 w-16 h-16 border-t-[6px] border-r-[6px] border-emerald-400 rounded-tr-[2rem]"></div>
                                            <div className="absolute bottom-0 left-0 w-16 h-16 border-b-[6px] border-l-[6px] border-emerald-400 rounded-bl-[2rem]"></div>
                                            <div className="absolute bottom-0 right-0 w-16 h-16 border-b-[6px] border-r-[6px] border-emerald-400 rounded-br-[2rem]"></div>
                                            <div className="absolute w-full h-1 bg-gradient-to-r from-transparent via-emerald-400 to-transparent top-0 animate-scan shadow-[0_0_20px_emerald]"></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-[3rem] border border-slate-100">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Atau Input Manual Plat Nomor</p>
                                    <input 
                                        autoFocus 
                                        placeholder="KETIK PLAT..." 
                                        onKeyPress={e => e.key === 'Enter' && processScan(e.target.value)} 
                                        className="w-full p-6 bg-slate-50 text-emerald-700 text-center rounded-[2rem] border-2 border-emerald-50 outline-none uppercase font-black text-2xl placeholder:opacity-20 focus:bg-white focus:border-emerald-500 transition-all" 
                                    />
                                </div>

                                <button onClick={()=>setView('dashboard')} className="text-emerald-600 font-black hover:text-emerald-800 transition-all uppercase text-xs tracking-[0.2em] bg-white px-8 py-4 rounded-full border">Batalkan Pemindaian</button>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-2xl mx-auto animate-in slide-in-from-bottom-12 duration-700">
                                {!registeredQR ? (
                                    <div className="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-xl">
                                        <div className="flex items-center gap-6 mb-12 text-left">
                                            <div className="h-16 w-16 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center flex-col gap-1 border">
                                                <Icon name="car" size={24} />
                                                <Icon name="bike" size={20} />
                                            </div>
                                            <div>
                                                <h2 className="text-3xl font-black text-slate-800 leading-none">Registrasi Unit</h2>
                                                <p className="text-[10px] font-bold text-emerald-600 uppercase mt-2 tracking-widest">Pendaftaran Kendaraan Baru</p>
                                            </div>
                                        </div>
                                        <form onSubmit={handleRegisterVehicle} className="space-y-8 text-left">
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 block">Nomor Plat Kendaraan</label>
                                                <input name="platNomor" required placeholder="B 1234 XYZ" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-black uppercase outline-none focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50/50 transition-all text-3xl tracking-tighter shadow-inner" />
                                            </div>
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2 block">Nama Lengkap Pemilik / Unit</label>
                                                <input name="namaPemilik" required placeholder="NAMA LENGKAP" className="w-full p-7 bg-slate-50 rounded-3xl border border-slate-100 font-bold uppercase outline-none focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50/50 transition-all text-lg shadow-inner" />
                                            </div>
                                            <button disabled={isLoading} className="w-full bg-emerald-600 text-white p-7 rounded-[2rem] font-black text-lg shadow-2xl shadow-emerald-100 hover:bg-emerald-700 hover:-translate-y-1 transition-all active:scale-95">{isLoading ? 'Memproses Data...' : 'SIMPAN & GENERATE QR'}</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-white p-12 rounded-[4rem] border-t-[15px] border-emerald-600 text-center space-y-10 shadow-2xl animate-in zoom-in-90 duration-500">
                                        <div className="bg-emerald-50 p-10 rounded-[3rem] inline-block border-2 border-dashed border-emerald-100">
                                            <img src={registeredQR.qrUrl} className="mx-auto w-64 h-64 rounded-2xl shadow-lg border-4 border-white" />
                                        </div>
                                        <div>
                                            <p className="text-emerald-600 font-black text-xs uppercase tracking-[0.3em] mb-2">Unit Berhasil Terdaftar</p>
                                            <h3 className="text-6xl font-black tracking-tighter text-slate-900">{registeredQR.platNomor}</h3>
                                            <p className="text-slate-500 font-bold uppercase mt-2 tracking-widest">{registeredQR.namaPemilik}</p>
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <button onClick={handlePrint} className="flex-1 bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 shadow-xl hover:bg-black transition-all"><Icon name="printer" size={24} /> CETAK STIKER</button>
                                            <button onClick={()=>setRegisteredQR(null)} className="flex-1 bg-slate-100 p-6 rounded-[2rem] font-black text-slate-600 hover:bg-slate-200 transition-all">SELESAI</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-10 animate-in fade-in duration-700">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                    <div className="space-y-1 text-left">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">Riwayat Akses</h2>
                                        <p className="text-emerald-600 font-bold text-xs uppercase tracking-[0.2em]">Mobilitas Kebun Sei Rokan</p>
                                    </div>
                                    <div className="relative w-full md:w-96">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-200" size={20} />
                                        <input placeholder="Cari Plat / Nama..." onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-16 pr-8 py-5 border border-slate-100 bg-white rounded-3xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 font-bold text-sm shadow-sm transition-all" />
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[3.5rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-emerald-50/50 border-b border-emerald-50">
                                                <tr>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-[0.3em]">Identitas Unit</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-[0.3em] text-center">Waktu Masuk</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-[0.3em] text-center">Waktu Keluar</th>
                                                    <th className="p-8 text-[10px] font-black uppercase text-emerald-400 tracking-[0.3em] text-right">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredLogs.map(l => (
                                                    <tr key={l.id} className="hover:bg-emerald-50/20 transition-all duration-300 group">
                                                        <td className="p-8">
                                                            <div className="font-black text-2xl text-slate-800 group-hover:text-emerald-600 transition-colors tracking-tighter uppercase">{l.platNomor}</div>
                                                            <div className="text-[10px] uppercase font-bold text-slate-400 mt-1 tracking-widest">{l.namaPemilik}</div>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            <span className="text-xs font-black text-slate-600 block">{l.timestampMasuk?.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                                                            <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampMasuk?.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                        </td>
                                                        <td className="p-8 text-center">
                                                            {l.timestampKeluar ? (
                                                                <>
                                                                    <span className="text-xs font-black text-slate-600 block">{l.timestampKeluar.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                                                                    <span className="text-[10px] font-bold text-slate-400 block mt-1">{l.timestampKeluar.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                                                </>
                                                            ) : <span className="text-[10px] font-black text-emerald-600 italic bg-emerald-50 px-4 py-2 rounded-xl uppercase">Di Kebun</span>}
                                                        </td>
                                                        <td className="p-8 text-right">
                                                            <span className={`px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-sm ${l.status === 'AKTIF' ? 'bg-emerald-600 text-white shadow-emerald-100' : 'bg-slate-100 text-slate-400'}`}>
                                                                {l.status === 'AKTIF' ? 'AUTHORIZED' : 'FINISHED'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {filteredLogs.length === 0 && <div className="p-24 text-center text-slate-200"><Icon name="search" size={60} className="mx-auto mb-6 opacity-20" /><p className="font-black uppercase text-xs tracking-widest opacity-40">Data Tidak Ditemukan</p></div>}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
