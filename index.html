<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Afdeling VI - Sei Rokan</title>
    
    <!-- React, ReactDOM, and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0f172a; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scan 2s linear infinite; }
        @media print { body * { visibility: hidden; } .print-only, .print-only * { visibility: visible; } .print-only { display: flex !important; position: fixed; left: 0; top: 0; width: 100%; height: 100%; align-items: center; justify-content: center; background: white; z-index: 9999; } }
        
        .loader {
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a;">
            <div class="loader"></div>
            <p style="margin-top: 20px; color: #10b981; font-weight: 800; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;">Menghubungkan ke Server...</p>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, query, where, getDocs, deleteDoc
        };
    </script>

    <script type="text/babel">
        // 🔥 GLOBAL ERROR LOGGER
        window.onerror = function(message, source, lineno, colno, error) {
            console.log("GLOBAL ERROR:", message, error);
            return false;
        };

        const { useState, useEffect, useRef, useMemo } = React;

        // 🛡️ ERROR BOUNDARY COMPONENT
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            static getDerivedStateFromError() { return { hasError: true }; }
            componentDidCatch(error, info) { console.error("ERROR APP:", error, info); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#0f172a', color: 'white', textAlign: 'center', padding: 40}}>
                            <h2 className="text-2xl font-black mb-4">Terjadi Error Sistem</h2>
                            <button onClick={() => window.location.reload()} className="bg-emerald-600 px-8 py-4 rounded-2xl font-black shadow-lg">Reload Aplikasi</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        /**
         * ✅ CONFIG FIREBASE TERBARU
         */
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e",
            measurementId: "G-R88TK7L688"
        };

        const MASTER_PASSWORD = "MASTER6";

        /**
         * 🔥 FIX PERMANEN: Komponen Icon yang anti-crash.
         * Menggunakan dangerouslySetInnerHTML agar React benar-benar mengabaikan apa pun di dalamnya.
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            const iconName = useMemo(() => name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase(), [name]);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, class: className },
                        root: containerRef.current
                    });
                }
            }, [iconName, size, className]);

            return (
                <span ref={containerRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }}>
                    <i data-lucide={iconName} dangerouslySetInnerHTML={{ __html: '' }}></i>
                </span>
            );
        };

        const StatusToast = ({ message, type }) => (
            <div className={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold shadow-2xl z-[100] flex items-center gap-3 animate-bounce ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                <Icon name={type === 'success' ? "CheckCircle2" : "AlertCircle"} size={18} />
                <span className="text-sm whitespace-nowrap">{message}</span>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [currentOfficer, setCurrentOfficer] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [view, setView] = useState('login');
            const [officerNameInput, setOfficerNameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [allOfficers, setAllOfficers] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedQR, setSelectedQR] = useState(null);
            const [manualPlate, setManualPlate] = useState('');
            const [keteranganScan, setKeteranganScan] = useState('');
            const [capturedPhoto, setCapturedPhoto] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [previewImage, setPreviewImage] = useState(null);
            const [scanMode, setScanMode] = useState('masuk');
            const [isReady, setIsReady] = useState(false);
            const [officerSearch, setOfficerSearch] = useState('');
            const [configError, setConfigError] = useState(null);

            const scannerRef = useRef(null);
            const fileInputRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'smartgate-sei-rokan-v1';

            // ✅ PROTEKSI ROLE
            useEffect(() => {
                if (view === 'manage_officers' && userRole !== 'master') {
                    setView('dashboard');
                }
            }, [view, userRole]);

            // ✅ SESSION HANDLING
            useEffect(() => {
                const saved = localStorage.getItem('smartgate_session');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (!data.name || !data.role) throw new Error();
                        setCurrentOfficer(data.name);
                        setUserRole(data.role);
                        setView('dashboard');
                    } catch (e) {
                        localStorage.removeItem('smartgate_session');
                    }
                }
            }, []);

            // 1. Firebase Initialization
            useEffect(() => {
                const checkStatus = setInterval(() => {
                    if (window.Firebase && window.lucide && window.Html5Qrcode) {
                        clearInterval(checkStatus);
                        initializeFirebase();
                    }
                }, 100);

                const initializeFirebase = async () => {
                    const f = window.Firebase;
                    try {
                        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
                        const fbApp = f.initializeApp(config);
                        const auth = f.getAuth(fbApp);
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await f.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await f.signInAnonymously(auth);
                        }
                        
                        f.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setIsReady(true);
                        });
                    } catch (err) {
                        console.error(err);
                        setConfigError("Koneksi Database Gagal. Pastikan API Key benar.");
                        setIsReady(true);
                    }
                };
                return () => clearInterval(checkStatus);
            }, []);

            // 2. Data Sync
            useEffect(() => {
                if (!user || !window.Firebase) return;
                const f = window.Firebase;
                const db = f.getFirestore();
                const vRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const oRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'officers');

                const unsubV = f.onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = f.onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => {
                        const tA = a.timestampMasuk?.seconds || 0;
                        const tB = b.timestampMasuk?.seconds || 0;
                        return tB - tA;
                    }));
                }, (err) => console.error("Log Error:", err));
                
                const unsubO = f.onSnapshot(oRef, (snap) => setAllOfficers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubV(); unsubL(); unsubO(); };
            }, [user]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const safelyClearScanner = async () => {
                if (scannerRef.current) {
                    const scanner = scannerRef.current;
                    scannerRef.current = null;
                    try {
                        if (scanner.getState() === 2) await scanner.stop();
                        await scanner.clear();
                        const reader = document.getElementById("reader");
                        if (reader) reader.innerHTML = "";
                    } catch (err) { console.warn(err); }
                }
            };

            useEffect(() => {
                if (view !== 'scan' || !isReady) {
                    safelyClearScanner();
                    return;
                }
                let isMounted = true;
                const timer = setTimeout(async () => {
                    const readerElement = document.getElementById("reader");
                    if (!readerElement || !isMounted) return;
                    try {
                        const html5QrCode = new Html5Qrcode("reader");
                        scannerRef.current = html5QrCode;
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 250 } },
                            (text) => { if (isMounted) processScan(text); },
                            () => {}
                        );
                    } catch (err) { console.error(err); }
                }, 400);
                return () => { isMounted = false; clearTimeout(timer); safelyClearScanner(); };
            }, [view, isReady]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                try {
                    if (officerNameInput.toLowerCase() === 'master' && passwordInput === MASTER_PASSWORD) {
                        setSession('Master Administrator', 'master');
                        return;
                    }
                    const db = f.getFirestore();
                    const oRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'officers');
                    const q = f.query(oRef, f.where("name", "==", officerNameInput.trim()), f.where("password", "==", passwordInput.trim()));
                    const snap = await f.getDocs(q);
                    if (!snap.empty) setSession(snap.docs[0].data().name, 'officer');
                    else showStatus("Kredensial Tidak Valid!", "error");
                } catch (err) { showStatus("Gangguan Koneksi", "error"); } finally { setIsLoading(false); }
            };

            const setSession = (name, role) => {
                setCurrentOfficer(name);
                setUserRole(role);
                localStorage.setItem('smartgate_session', JSON.stringify({ name, role }));
                setView('dashboard');
                setOfficerNameInput('');
                setPasswordInput('');
                showStatus(`Selamat Datang, ${name}`);
            };

            const handleLogout = async () => {
                setIsLoading(true);
                await safelyClearScanner();
                setCurrentOfficer(null);
                setUserRole(null);
                localStorage.removeItem('smartgate_session');
                setView('login');
                setIsLoading(false);
                showStatus("Anda telah keluar.");
            };

            const processScan = async (val) => {
                if (isLoading || !user || !window.Firebase) return;
                const f = window.Firebase;
                const plat = (val || manualPlate).toUpperCase().trim();
                if (!plat) return;
                setIsLoading(true);
                try {
                    const db = f.getFirestore();
                    const vDocRef = f.doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat);
                    const vDoc = await f.getDoc(vDocRef);
                    if (!vDoc.exists()) { showStatus("UNIT TIDAK TERDAFTAR!", "error"); setIsLoading(false); return; }
                    const vData = vDoc.data();
                    const status = vData.status || 'di_luar';
                    const lRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                    if (scanMode === 'masuk') {
                        if (status === 'di_dalam') { showStatus("UNIT MASIH DI DALAM!", "error"); setIsLoading(false); return; }
                        await f.addDoc(lRef, { platNomor: plat, namaPemilik: vData.namaPemilik, timestampMasuk: f.Timestamp.now(), status: 'AKTIF', petugasMasuk: currentOfficer, keterangan: keteranganScan || "AKSES RUTIN", photo: capturedPhoto || null });
                        await f.updateDoc(vDocRef, { status: 'di_dalam' });
                        showStatus(`MASUK: ${plat}`);
                    } else {
                        if (status === 'di_luar') { showStatus("UNIT SUDAH DI LUAR!", "error"); setIsLoading(false); return; }
                        const q = f.query(lRef, f.where("platNomor", "==", plat), f.where("status", "==", "AKTIF"));
                        const snap = await f.getDocs(q);
                        if (!snap.empty) {
                            await f.updateDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'logs', snap.docs[0].id), { timestampKeluar: f.Timestamp.now(), status: 'SELESAI', petugasKeluar: currentOfficer, photoExit: capturedPhoto || null });
                        }
                        await f.updateDoc(vDocRef, { status: 'di_luar' });
                        showStatus(`KELUAR: ${plat}`);
                    }
                    await safelyClearScanner();
                    setManualPlate(''); setKeteranganScan(''); setCapturedPhoto(null); setView('dashboard');
                } catch (err) { showStatus("Gagal Memproses Data", "error"); } finally { setIsLoading(false); }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                const fd = new FormData(e.target);
                const plat = fd.get('plat').toUpperCase().trim();
                const nama = fd.get('nama').trim();
                try {
                    const db = f.getFirestore();
                    await f.setDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat), { platNomor: plat, namaPemilik: nama, createdAt: f.Timestamp.now(), status: 'di_luar', pendaftar: currentOfficer });
                    setRegisteredQR({ platNomor: plat, namaPemilik: nama, qrUrl: `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${plat}` });
                    showStatus("Unit Terdaftar!");
                } catch (err) { showStatus("Gagal Registrasi", "error"); } finally { setIsLoading(false); }
            };

            const addOfficer = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                const fd = new FormData(e.target);
                const name = fd.get('name').trim();
                const pass = fd.get('pass').trim();
                if (allOfficers.some(off => off.name.toLowerCase() === name.toLowerCase())) { showStatus("Nama sudah ada!", "error"); setIsLoading(false); return; }
                try {
                    const db = f.getFirestore();
                    await f.addDoc(f.collection(db, 'artifacts', appId, 'public', 'data', 'officers'), { name, password: pass, createdAt: f.Timestamp.now() });
                    showStatus("Petugas Ditambahkan");
                    e.target.reset();
                } catch (err) { showStatus("Gagal", "error"); } finally { setIsLoading(false); }
            };

            const deleteOfficer = async (id) => {
                const f = window.Firebase;
                try {
                    const db = f.getFirestore();
                    await f.deleteDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'officers', id));
                    showStatus("Petugas Dihapus");
                } catch (err) { showStatus("Gagal", "error"); }
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="flex flex-col items-center gap-4"><div className="loader"></div><p className="font-bold text-emerald-500 uppercase tracking-widest text-[10px]">Menyiapkan Tampilan...</p></div></div>;

            if (configError) return <div className="min-h-screen bg-rose-600 flex items-center justify-center p-8"><div className="bg-white p-10 rounded-[3rem] text-center max-w-md shadow-2xl space-y-6"><Icon name="AlertTriangle" size={64} className="text-rose-500 mx-auto" /><h2 className="text-2xl font-black text-slate-800 leading-none">Kesalahan Konfigurasi</h2><p className="text-slate-500 text-sm font-medium">{configError}</p><button onClick={() => window.location.reload()} className="w-full bg-rose-500 text-white p-4 rounded-2xl font-black shadow-lg">COBA LAGI</button></div></div>;

            if (view === 'login') return (
                <div className="min-h-screen bg-emerald-600 flex items-center justify-center p-6 text-slate-900">
                    <div className="w-full max-w-md bg-white rounded-[3rem] p-10 shadow-2xl text-center space-y-8 animate-in zoom-in-95">
                        <div className="flex flex-col items-center gap-4">
                            <div className="h-20 w-20 bg-emerald-50 text-emerald-600 rounded-[2rem] flex items-center justify-center shadow-inner"><Icon name="ShieldCheck" size={48} /></div>
                            <div><h1 className="text-3xl font-black text-slate-800 leading-tight">SmartGate</h1><p className="text-emerald-500 font-bold uppercase text-xs tracking-widest">AFDELING VI - SEI ROKAN</p></div>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6 text-left">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-5">ID Petugas</label>
                                <div className="relative">
                                    <Icon name="User" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-300" size={18} />
                                    <input type="text" value={officerNameInput} onChange={(e) => setOfficerNameInput(e.target.value)} placeholder="Username..." required className="w-full pl-14 pr-8 py-5 bg-slate-50 border-2 border-slate-100 rounded-[2rem] font-bold outline-none focus:border-emerald-500 transition-all shadow-inner uppercase" />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-5">Sandi</label>
                                <div className="relative">
                                    <Icon name="Lock" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-300" size={18} />
                                    <input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••••••" required className="w-full pl-14 pr-14 py-4 bg-slate-50 border-2 border-slate-100 rounded-[2rem] font-bold outline-none focus:border-emerald-500 transition-all shadow-inner" />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-emerald-500"><Icon name={showPassword ? "EyeOff" : "Eye"} size={18} /></button>
                                </div>
                            </div>
                            <button type="submit" disabled={isLoading} className="w-full bg-emerald-600 text-white p-6 rounded-[2rem] font-black text-lg shadow-xl hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-4">{isLoading ? <div className="loader !w-6 !h-6 !border-white !border-t-transparent"></div> : <Icon name="LogIn" size={20} />}<span>{isLoading ? 'MEMVERIFIKASI...' : 'MASUK SISTEM'}</span></button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#F8FAFC] text-slate-900">
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 transition-transform duration-300 z-[60] p-8 flex flex-col shadow-2xl md:shadow-none ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12">
                            <div className="h-12 w-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="ShieldCheck" size={28} /></div>
                            <div><h1 className="text-xl font-extrabold text-slate-800 leading-tight">SmartGate</h1><p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest leading-none mt-1">Afdeling VI</p></div>
                        </div>
                        <nav className="space-y-1 flex-1 overflow-y-auto no-scrollbar">
                            {[
                                {id:'dashboard', icon:'LayoutDashboard', label:'Dashboard'}, 
                                {id:'scan', icon:'ShieldCheck', label:'Scan Akses'}, 
                                {id:'register', icon:'PlusCircle', label:'Registrasi Unit'}, 
                                {id:'units', icon:'Database', label:'Data Unit'}, 
                                {id:'history', icon:'History', label:'Log Aktivitas'}
                            ].map(item => (
                                <button key={item.id} onClick={async () => { if (view === 'scan') await safelyClearScanner(); setView(item.id); setIsSidebarOpen(false); }} className={`flex items-center space-x-4 w-full p-4 rounded-xl font-bold text-sm transition-all ${view === item.id ? 'bg-emerald-600 text-white shadow-xl' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}>
                                    <Icon name={item.icon} size={20} /> <span>{item.label}</span>
                                </button>
                            ))}
                            {userRole === 'master' && (
                                <>
                                    <div className="pt-8 pb-4 px-4 text-[10px] font-black text-slate-300 uppercase tracking-widest">Administrator</div>
                                    <button onClick={async () => { if (view === 'scan') await safelyClearScanner(); setView('manage_officers'); setIsSidebarOpen(false); }} className={`flex items-center space-x-4 w-full p-4 rounded-xl font-bold text-sm transition-all ${view === 'manage_officers' ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <Icon name="Users" size={20} /> <span>Kelola Tim</span>
                                    </button>
                                </>
                            )}
                        </nav>
                        <div className="mt-auto pt-6 space-y-4">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-3 p-4 bg-rose-50 text-rose-600 rounded-2xl font-black text-xs hover:bg-rose-100 transition-all border border-rose-100 tracking-widest uppercase"><Icon name="LogOut" size={16} /> Keluar</button>
                            <div className={`p-4 rounded-2xl border flex items-center gap-3 ${userRole === 'master' ? 'bg-slate-900 border-slate-800' : 'bg-emerald-50 border-emerald-100'}`}>
                                <div className={`h-10 w-10 rounded-full flex items-center justify-center font-black text-xs border shadow-sm flex-shrink-0 ${userRole === 'master' ? 'bg-slate-800 text-white border-slate-700' : 'bg-white text-emerald-600 border-emerald-100'}`}>{userRole === 'master' ? 'MS' : 'VI'}</div>
                                <div className="overflow-hidden"><p className={`text-[8px] font-black uppercase tracking-widest leading-none mb-1 ${userRole === 'master' ? 'text-slate-400' : 'text-emerald-400'}`}>PETUGAS JAGA</p><p className={`text-[10px] font-bold truncate uppercase ${userRole === 'master' ? 'text-white' : 'text-emerald-900'}`}>{currentOfficer}</p></div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="md:hidden bg-white border-b p-4 flex items-center justify-between sticky top-0 z-50 shadow-sm">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="Menu" size={24} /></button>
                            <h2 className="text-xs font-black text-emerald-600 uppercase tracking-widest leading-none">SmartGate VI</h2>
                            <div className="w-10"></div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-12 relative no-scrollbar">
                            {statusMsg && <StatusToast message={statusMsg.text} type={statusMsg.type} />}
                            {view === 'dashboard' && (
                                <div className="space-y-8 animate-in fade-in duration-500 pb-12">
                                    <div className="bg-emerald-600 p-8 md:p-20 rounded-[4rem] text-white shadow-2xl relative overflow-hidden flex flex-col items-center text-center">
                                        <div className="relative z-10 space-y-6">
                                            <div className="bg-emerald-500/50 backdrop-blur-sm px-5 py-2 rounded-full inline-flex items-center gap-3 border border-emerald-400/50"><Icon name="UserCheck" size={14} /> <span className="text-[10px] font-black uppercase tracking-widest">{currentOfficer} • Pos VI</span></div>
                                            <h2 className="text-3xl md:text-7xl font-black tracking-tighter uppercase leading-none">KEBUN <br/><span className="text-emerald-200">SEI ROKAN</span></h2>
                                            <div className="text-5xl md:text-9xl font-black tabular-nums drop-shadow-2xl">{currentTime.toLocaleTimeString('id-ID')}</div>
                                            <p className="text-[10px] md:text-base font-bold uppercase tracking-widest opacity-70">Security Gate Control VI</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <button onClick={() => { setScanMode('masuk'); setView('scan'); }} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center gap-6 group hover:border-emerald-500 transition-all text-left"><div className="h-20 w-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowDownLeft" size={32}/></div><div><h3 className="font-black text-2xl text-slate-800 uppercase tracking-tighter leading-none">Scan Masuk</h3><p className="text-slate-400 text-xs font-bold uppercase mt-1">Otorisasi Unit Masuk</p></div></button>
                                        <button onClick={() => { setScanMode('keluar'); setView('scan'); }} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center gap-6 group hover:border-rose-500 transition-all text-left"><div className="h-20 w-20 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center group-hover:bg-rose-600 group-hover:text-white transition-all shadow-inner"><Icon name="ArrowUpRight" size={32}/></div><div><h3 className="font-black text-2xl text-slate-800 uppercase tracking-tighter leading-none">Scan Keluar</h3><p className="text-slate-400 text-xs font-bold uppercase mt-1">Konfirmasi Unit Keluar</p></div></button>
                                    </div>
                                </div>
                            )}
                            {view === 'history' && (
                                <div className="space-y-8 animate-in fade-in duration-700 pb-20">
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-6"><h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Log Aktivitas</h2><div className="relative w-full md:w-96"><Icon name="Search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300" size={20} /><input placeholder="Cari..." onChange={e => setSearchQuery(e.target.value)} className="w-full pl-14 pr-6 py-4 border border-slate-100 bg-white rounded-2xl outline-none" /></div></div>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm"><div className="overflow-x-auto"><table className="w-full text-left min-w-[1000px]"><thead className="bg-emerald-50/20"><tr><th className="p-8 text-[10px] font-black uppercase text-emerald-600 tracking-widest">Unit</th><th className="p-8 text-[10px] font-black uppercase text-emerald-600 tracking-widest">Waktu</th><th className="p-8 text-[10px] font-black uppercase text-emerald-600 tracking-widest">Keperluan</th><th className="p-8 text-[10px] font-black uppercase text-emerald-600 tracking-widest">Petugas</th><th className="p-8 text-[10px] font-black uppercase text-emerald-600 tracking-widest text-right">Verifikasi</th></tr></thead><tbody className="divide-y divide-slate-50">{logs.filter(l => l.platNomor.toLowerCase().includes(searchQuery.toLowerCase())).map(l => (<tr key={l.id} className="hover:bg-emerald-50/5 transition-all group"><td className="p-8"><div className="font-black text-3xl text-slate-800 uppercase tracking-tighter leading-none">{l.platNomor}</div><div className="text-[10px] font-bold text-slate-400 uppercase mt-1">{l.namaPemilik}</div></td><td className="p-8"><div className="flex items-center gap-4">{(l.photo || l.photoExit) && <div onClick={() => setPreviewImage(l.photo || l.photoExit)} className="h-12 w-12 rounded-lg bg-slate-100 overflow-hidden cursor-zoom-in shadow-sm border border-white"><img src={l.photo || l.photoExit} className="w-full h-full object-cover" /></div>}<div><div className="font-black text-lg text-slate-700 tabular-nums">IN: {l.timestampMasuk?.toDate().toLocaleTimeString('id-ID')}</div>{l.timestampKeluar && <div className="font-black text-lg text-slate-700 tabular-nums">OUT: {l.timestampKeluar?.toDate().toLocaleTimeString('id-ID')}</div>}</div></div></td><td className="p-8"><span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{l.keterangan || "Akses Rutin"}</span></td><td className="p-8"><div className="text-[9px] font-black uppercase text-slate-600">IN: {l.petugasMasuk}</div>{l.petugasKeluar && <div className="text-[9px] font-black uppercase text-slate-600">OUT: {l.petugasKeluar}</div>}</td><td className="p-8 text-right"><span className="bg-emerald-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md">Verified</span></td></tr>))}</tbody></table></div></div>
                                </div>
                            )}
                            {view === 'scan' && (
                                <div className="max-w-2xl mx-auto space-y-8 animate-in zoom-in-95 pb-20">
                                    <div className="flex bg-slate-100 p-1.5 rounded-[2rem] shadow-inner"><button onClick={() => setScanMode('masuk')} className={`flex-1 py-4 rounded-[1.8rem] font-black text-xs uppercase transition-all ${scanMode === 'masuk' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400'}`}>SCAN MASUK</button><button onClick={() => setScanMode('keluar')} className={`flex-1 py-4 rounded-[1.8rem] font-black text-xs uppercase transition-all ${scanMode === 'keluar' ? 'bg-rose-500 text-white shadow-lg' : 'text-slate-400'}`}>SCAN KELUAR</button></div>
                                    <div className="bg-slate-900 aspect-square rounded-[4rem] p-4 relative overflow-hidden border-[15px] border-white shadow-2xl"><div id="reader" className="w-full h-full rounded-[3rem] overflow-hidden"></div><div className="absolute inset-0 pointer-events-none p-12"><div className={`w-full h-1 opacity-50 shadow-[0_0_15px] animate-scan absolute top-0 left-0 ${scanMode === 'masuk' ? 'bg-emerald-400 shadow-emerald-400' : 'bg-rose-400 shadow-rose-400'}`}></div></div></div>
                                    <div className="bg-white p-8 rounded-[3.5rem] border border-slate-100 space-y-6 shadow-sm">{!capturedPhoto ? (<button onClick={() => fileInputRef.current?.click()} className="w-full h-40 border-4 border-dashed border-slate-100 rounded-[2rem] flex flex-col items-center justify-center gap-3 text-slate-400 hover:text-emerald-500 transition-all bg-slate-50/50"><Icon name="Camera" size={40} /> <span className="font-bold text-sm uppercase">Foto Bukti</span></button>) : (<div className="relative rounded-[2.5rem] overflow-hidden border-4 border-emerald-100 shadow-xl"><img src={capturedPhoto} className="w-full h-60 object-cover" /><button onClick={() => setCapturedPhoto(null)} className="absolute top-4 right-4 h-12 w-12 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-lg"><Icon name="Trash2" size={20} /></button></div>)}<input type="file" accept="image/*" capture="environment" hidden ref={fileInputRef} onChange={(e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setCapturedPhoto(reader.result); reader.readAsDataURL(file); } }} /><div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Input Plat</label><input placeholder="BM 1234 XY" value={manualPlate} onChange={e => setManualPlate(e.target.value.toUpperCase())} className={`w-full p-6 text-center rounded-[2rem] border-2 outline-none uppercase font-black text-3xl shadow-inner transition-all ${scanMode === 'masuk' ? 'bg-emerald-50 text-emerald-700 border-emerald-50' : 'bg-rose-50 text-rose-700 border-rose-50'}`} /></div><button onClick={() => processScan()} disabled={isLoading} className={`w-full p-8 rounded-[2rem] font-black text-xl shadow-xl transition-all active:scale-95 ${scanMode === 'masuk' ? 'bg-emerald-600 text-white' : 'bg-rose-500 text-white'}`}>{isLoading ? 'MEMPROSES...' : 'KONFIRMASI'}</button></div>
                                </div>
                            )}
                            {view === 'register' && (
                                <div className="max-w-2xl mx-auto pb-20 animate-in slide-in-from-bottom-8">
                                    {!registeredQR ? (<div className="bg-white p-14 rounded-[4rem] border border-slate-100 shadow-xl"><h2 className="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Unit Baru</h2><form onSubmit={handleRegister} className="space-y-8"><div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-5">Nomor Plat</label><input name="plat" required placeholder="BM 1234 XY" className="w-full p-6 bg-slate-50 text-emerald-700 rounded-[2rem] border-2 border-emerald-50 outline-none uppercase font-black text-2xl shadow-inner focus:border-emerald-500" /></div><div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-5">Nama Pemilik / Supir</label><input name="nama" required placeholder="Nama Lengkap..." className="w-full p-6 bg-slate-50 rounded-[2rem] border-2 border-emerald-50 outline-none font-black text-xl shadow-inner uppercase transition-all" /></div><button disabled={isLoading} className="w-full bg-emerald-600 text-white p-8 rounded-[2.5rem] font-black text-xl shadow-xl active:scale-95 transition-all">SIMPAN DATA</button></form></div>) : (<div className="bg-white p-12 rounded-[4rem] border-t-[15px] border-emerald-600 text-center space-y-10 shadow-2xl animate-in zoom-in-95"><img src={registeredQR.qrUrl} className="w-64 h-64 mx-auto rounded-3xl bg-slate-50 p-6 shadow-inner" /><h3 className="text-7xl font-black text-slate-900 uppercase tracking-tighter leading-none">{registeredQR.platNomor}</h3><p className="text-slate-500 font-extrabold uppercase tracking-widest text-sm">{registeredQR.namaPemilik}</p><div className="flex gap-4"><button onClick={() => window.print()} className="flex-1 bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 hover:bg-black shadow-xl transition-all"><Icon name="Printer" /> CETAK</button><button onClick={() => setRegisteredQR(null)} className="flex-1 bg-slate-100 text-slate-500 p-6 rounded-[2rem] font-black hover:bg-slate-200 transition-all">SELESAI</button></div></div>)}
                                </div>
                            )}
                            {view === 'units' && (
                                <div className="space-y-8 animate-in fade-in duration-700 pb-20"><div className="flex flex-col md:flex-row justify-between items-center gap-6"><h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Database Unit</h2><div className="relative w-full md:w-96"><Icon name="Search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300" size={20} /><input placeholder="Cari..." onChange={e => setSearchQuery(e.target.value)} className="w-full pl-14 pr-6 py-4 border border-slate-100 bg-white rounded-2xl outline-none font-bold text-sm shadow-sm" /></div></div><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{vehicles.filter(v => v.platNomor.toLowerCase().includes(searchQuery.toLowerCase()) || v.namaPemilik.toLowerCase().includes(searchQuery.toLowerCase())).map(v => (<div key={v.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-md transition-all group relative overflow-hidden flex flex-col items-center text-center"><div className="flex justify-between items-start w-full mb-4"><div className="h-12 w-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="Car" size={20} /></div><button onClick={() => setSelectedQR(v)} className="p-3 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-600 hover:text-white transition-all"><Icon name="Printer" size={16} /></button></div><h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter leading-none mb-1">{v.platNomor}</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{v.namaPemilik}</p><div className="mt-6 pt-4 border-t border-slate-50 flex items-center justify-between w-full"><div className="flex items-center gap-2"><span className={`h-2.5 w-2.5 rounded-full ${v.status === 'di_dalam' ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-slate-200'}`}></span><span className="text-[8px] font-black text-slate-300 uppercase tracking-widest">{v.status === 'di_dalam' ? 'DI AREA' : 'DI LUAR'}</span></div></div></div>))}</div></div>
                            )}
                            {view === 'manage_officers' && userRole === 'master' && (
                                <div className="space-y-12 animate-in slide-in-from-bottom-8 pb-20"><div className="flex flex-col md:flex-row justify-between items-center gap-6"><h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Kelola Tim Jaga</h2><div className="relative w-full md:w-80"><Icon name="Search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300" size={20} /><input placeholder="Cari..." value={officerSearch} onChange={e => setOfficerSearch(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-white border border-slate-100 rounded-2xl font-bold text-sm shadow-sm outline-none" /></div></div><div className="grid grid-cols-1 lg:grid-cols-3 gap-8"><div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl space-y-8 h-fit lg:sticky lg:top-12"><h3 className="text-xl font-black uppercase tracking-tighter">Tambah Personel</h3><form onSubmit={addOfficer} className="space-y-6"><input name="name" required placeholder="NAMA LENGKAP" className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-emerald-500 outline-none uppercase shadow-inner" /><input name="pass" type="password" required placeholder="KATA SANDI" className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-2 border-transparent focus:border-emerald-500 outline-none shadow-inner" /><button type="submit" disabled={isLoading} className="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black shadow-lg">DAFTARKAN</button></form></div><div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">{allOfficers.filter(o => o.name.toLowerCase().includes(officerSearch.toLowerCase())).map(off => (<div key={off.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center justify-between group hover:border-emerald-200 transition-all"><div className="flex items-center gap-4"><div className="h-14 w-14 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center font-black text-xs uppercase">{off.name.charAt(0)}</div><div><p className="font-black text-slate-800 uppercase leading-none">{off.name}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">Registrasi: {off.createdAt?.toDate().toLocaleDateString()}</p></div></div><button onClick={() => { if(window.confirm(`Hapus akun ${off.name}?`)) deleteOfficer(off.id); }} className="p-3 text-slate-200 hover:text-rose-600 transition-all"><Icon name="Trash2" size={18} /></button></div>))}</div></div></div>
                            )}
                        </div>
                    </main>

                    {previewImage && (<div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm" onClick={() => setPreviewImage(null)}><button onClick={() => setPreviewImage(null)} className="absolute top-8 right-8 text-white/50 hover:text-white transition-all"><Icon name="X" size={40}/></button><img src={previewImage} className="max-h-[80vh] w-auto rounded-3xl shadow-2xl border-4 border-white/10" /></div>)}
                    {selectedQR && (<div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm transition-all animate-in fade-in" onClick={() => setSelectedQR(null)}><div className="bg-white w-full max-w-sm rounded-[4rem] p-12 text-center shadow-2xl relative animate-in zoom-in-95" onClick={e => e.stopPropagation()}><button onClick={() => setSelectedQR(null)} className="absolute top-8 right-8 text-slate-300 hover:text-rose-500 transition-colors"><Icon name="X" size={28} /></button><div className="bg-slate-50 p-6 rounded-[2.5rem] inline-block mb-8 shadow-inner"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${selectedQR.platNomor}`} className="w-44 h-44 mx-auto rounded-xl" alt="QR" /></div><h3 className="text-6xl font-black text-slate-900 tracking-tighter leading-none mb-3 uppercase">{selectedQR.platNomor}</h3><p className="text-emerald-600 font-black uppercase text-[10px] tracking-[0.3em] mb-12 leading-none">{selectedQR.namaPemilik}</p><button onClick={() => { setRegisteredQR({ ...selectedQR, qrUrl: `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${selectedQR.platNomor}` }); setSelectedQR(null); setTimeout(() => window.print(), 200); }} className="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition-all uppercase tracking-widest"><Icon name="Printer" size={22} /> CETAK STIKER</button></div></div>)}
                    <div className="print-only hidden">{registeredQR && (<div className="flex flex-col items-center justify-center border-2 border-black p-10 w-[100mm] h-[100mm] text-center bg-white text-black"><h1 className="m-0 text-sm font-black uppercase">AFDELING VI SEI ROKAN</h1><img src={registeredQR.qrUrl} className="w-[50mm] h-[50mm] my-4" /><h2 className="m-0 text-4xl font-black uppercase tracking-tighter">{registeredQR.platNomor}</h2><p className="mt-2 text-xs font-bold uppercase">{registeredQR.namaPemilik}</p></div>)}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
