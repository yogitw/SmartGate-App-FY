<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartGate Sei Rokan</title>
    
    <!-- React, ReactDOM, and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0f172a; 
            margin: 0; 
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        #root { height: 100%; }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes scan-line { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scan-line 2s linear infinite; }
        
        .loader {
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .main-content { height: calc(100dvh - 64px); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a;">
            <div class="loader"></div>
            <p style="margin-top: 20px; color: #10b981; font-weight: 800; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;">Menghubungkan ke Server...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, Timestamp, query, where, getDocs, deleteDoc
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const defaultFirebaseConfig = {
            apiKey: "AIzaSyBvXN-verMsJQQC77p1I7Abc5vOAScPR2k",
            authDomain: "smartgate-app-fy.firebaseapp.com",
            projectId: "smartgate-app-fy",
            storageBucket: "smartgate-app-fy.firebasestorage.app",
            messagingSenderId: "558199352587",
            appId: "1:558199352587:web:68b3217cbc0ba9e960460e"
        };

        const MASTER_PASSWORD = "MASTER6";

        // Fungsi Utility untuk Kompresi Gambar agar tidak kena limit 1MB Firestore
        const compressImage = (base64Str, maxWidth = 1000, quality = 0.7) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxWidth) {
                            width *= maxWidth / height;
                            height = maxWidth;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, class: className },
                        root: containerRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }}><i data-lucide={name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase()}></i></span>;
        };

        const StatusToast = ({ message, type }) => (
            <div className={`fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-black shadow-2xl z-[300] flex items-center gap-4 animate-in slide-in-from-top duration-300 ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                <Icon name={type === 'success' ? "CheckCircle2" : "AlertCircle"} size={24} />
                <span className="text-sm uppercase tracking-widest">{message}</span>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [currentOfficer, setCurrentOfficer] = useState(null);
            const [currentOfficerId, setCurrentOfficerId] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [view, setView] = useState('login');
            const [officerNameInput, setOfficerNameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [vehicles, setVehicles] = useState([]);
            const [logs, setLogs] = useState([]);
            const [allOfficers, setAllOfficers] = useState([]);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [officerSearch, setOfficerSearch] = useState('');
            const [registeredQR, setRegisteredQR] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedQR, setSelectedQR] = useState(null);
            const [manualPlate, setManualPlate] = useState('');
            const [keteranganScan, setKeteranganScan] = useState('');
            const [capturedPhoto, setCapturedPhoto] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [previewImage, setPreviewImage] = useState(null);
            const [scanMode, setScanMode] = useState('masuk');
            const [verificationMethod, setVerificationMethod] = useState('qr');
            const [isReady, setIsReady] = useState(false);

            const scannerRef = useRef(null);
            const fileInputRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'smartgate-sei-rokan-v1';

            useEffect(() => {
                const saved = localStorage.getItem('smartgate_session');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setCurrentOfficer(data.name);
                        setCurrentOfficerId(data.id);
                        setUserRole(data.role);
                        setView('dashboard');
                    } catch (e) { localStorage.removeItem('smartgate_session'); }
                }

                const initFirebase = async () => {
                    if (!window.Firebase) return;
                    const f = window.Firebase;
                    try {
                        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
                        const fbApp = f.initializeApp(config);
                        const auth = f.getAuth(fbApp);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await f.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await f.signInAnonymously(auth);
                        }
                        f.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setIsReady(true);
                        });
                    } catch (err) { console.error(err); setIsReady(true); }
                };
                initFirebase();
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!user || !window.Firebase) return;
                const f = window.Firebase;
                const db = f.getFirestore();
                const vRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'vehicles');
                const lRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const oRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'officers');

                const unsubV = f.onSnapshot(vRef, (snap) => setVehicles(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubL = f.onSnapshot(lRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(data.sort((a, b) => (b.timestampMasuk?.seconds || 0) - (a.timestampMasuk?.seconds || 0)));
                });
                const unsubO = f.onSnapshot(oRef, (snap) => setAllOfficers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubV(); unsubL(); unsubO(); };
            }, [user]);

            const safelyClearScanner = async () => {
                if (scannerRef.current) {
                    try {
                        if (scannerRef.current.getState() === 2) await scannerRef.current.stop();
                        await scannerRef.current.clear();
                        scannerRef.current = null;
                    } catch (err) { console.warn("Clear error:", err); }
                }
            };

            useEffect(() => {
                if (view !== 'scan' || verificationMethod !== 'qr' || !capturedPhoto) {
                    safelyClearScanner();
                    return;
                }

                let isMounted = true;
                const startScanner = async () => {
                    await new Promise(r => setTimeout(r, 600));
                    const element = document.getElementById("reader");
                    if (!element || !isMounted) return;

                    try {
                        await safelyClearScanner();
                        const html5QrCode = new Html5Qrcode("reader");
                        scannerRef.current = html5QrCode;
                        await html5QrCode.start(
                            { facingMode: "environment" }, 
                            { fps: 10, qrbox: { width: 250, height: 250 } }, 
                            (text) => { if (isMounted) processScan(text); }, 
                            () => {}
                        );
                    } catch (err) { console.error("Scanner failed:", err); }
                };

                startScanner();
                return () => { isMounted = false; safelyClearScanner(); };
            }, [view, verificationMethod, capturedPhoto]);

            const showStatus = (text, type = 'success') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 4000);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                const db = f.getFirestore();
                const loginName = officerNameInput.trim().toUpperCase();
                const loginPass = passwordInput.trim();

                try {
                    if (loginName === 'MASTER' && loginPass === MASTER_PASSWORD) {
                        setSession('Master Administrator', 'master', 'master-id');
                        return;
                    }
                    const oRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'officers');
                    const q = f.query(oRef, f.where("name", "==", loginName), f.where("password", "==", loginPass));
                    const snap = await f.getDocs(q);
                    if (!snap.empty) {
                        const docId = snap.docs[0].id;
                        await f.updateDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'officers', docId), { status: 'online', lastActive: f.Timestamp.now() });
                        setSession(snap.docs[0].data().name, 'officer', docId);
                    } else showStatus("Kredensial Salah!", "error");
                } catch (err) { showStatus("Gagal Login. Cek Koneksi", "error"); } finally { setIsLoading(false); }
            };

            const setSession = (name, role, id) => {
                setCurrentOfficer(name);
                setCurrentOfficerId(id);
                setUserRole(role);
                localStorage.setItem('smartgate_session', JSON.stringify({ name, role, id }));
                setView('dashboard');
                showStatus(`Halo, ${name}`);
            };

            const handleLogout = async () => {
                setIsLoading(true);
                const f = window.Firebase;
                try {
                    if (currentOfficerId && currentOfficerId !== 'master-id') {
                        await f.updateDoc(f.doc(f.getFirestore(), 'artifacts', appId, 'public', 'data', 'officers', currentOfficerId), { status: 'offline' });
                    }
                    await safelyClearScanner();
                    localStorage.removeItem('smartgate_session');
                    window.location.reload();
                } catch (e) { setIsLoading(false); }
            };

            const processScan = async (scannedText = null) => {
                if (isLoading || !user) return;
                const plat = (scannedText || manualPlate).toUpperCase().replace(/\s+/g, '').trim();
                
                if (!plat || !capturedPhoto) {
                    showStatus("Lengkapi Foto Bukti!", "error");
                    return;
                }
                
                setIsLoading(true);
                const f = window.Firebase;
                const db = f.getFirestore();
                
                try {
                    const vDocRef = f.doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', plat);
                    const vDoc = await f.getDoc(vDocRef);
                    
                    if (!vDoc.exists()) { 
                        showStatus(`UNIT ${plat} TAK TERDAFTAR!`, "error"); 
                        setIsLoading(false); 
                        return; 
                    }
                    
                    const vData = vDoc.data();
                    const status = vData.status || 'di_luar';
                    const lRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                    
                    if (scanMode === 'masuk') {
                        if (status === 'di_dalam') { showStatus("AKSES DI TOLAJ UNIT MASIH DI DALAM!", "error"); setIsLoading(false); return; }
                        await f.addDoc(lRef, { platNomor: plat, namaPemilik: vData.namaPemilik, timestampMasuk: f.Timestamp.now(), status: 'AKTIF', petugasMasuk: currentOfficer, keterangan: keteranganScan || "AKSES RUTIN", photo: capturedPhoto });
                        await f.updateDoc(vDocRef, { status: 'di_dalam' });
                        showStatus(`BERHASIL SCAN: ${plat} MASUK`, "success");
                    } else {
                        if (status === 'di_luar') { showStatus("UNIT SUDAH DI LUAR!", "error"); setIsLoading(false); return; }
                        const q = f.query(lRef, f.where("platNomor", "==", plat), f.where("status", "==", "AKTIF"));
                        const snap = await f.getDocs(q);
                        if (!snap.empty) {
                            await f.updateDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'logs', snap.docs[0].id), { timestampKeluar: f.Timestamp.now(), status: 'SELESAI', petugasKeluar: currentOfficer, photoExit: capturedPhoto });
                        }
                        await f.updateDoc(vDocRef, { status: 'di_luar' });
                        showStatus(`BERHASIL SCAN: ${plat} KELUAR`, "success");
                    }
                    
                    await safelyClearScanner();
                    setManualPlate(''); setKeteranganScan(''); setCapturedPhoto(null); 
                    
                    setTimeout(() => {
                        setView('history');
                    }, 500);

                } catch (err) { showStatus("Gagal Simpan Data: Coba lagi", "error"); } finally { setIsLoading(false); }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                const fd = new FormData(e.target);
                const platRaw = fd.get('plat').toUpperCase().replace(/\s+/g, '').trim();
                const nama = fd.get('nama').trim().toUpperCase();
                try {
                    const db = f.getFirestore();
                    await f.setDoc(f.doc(db, 'artifacts', appId, 'public', 'data', 'vehicles', platRaw), { platNomor: platRaw, namaPemilik: nama, createdAt: f.Timestamp.now(), status: 'di_luar', pendaftar: currentOfficer });
                    setRegisteredQR({ platNomor: platRaw, namaPemilik: nama, qrUrl: `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${platRaw}` });
                    showStatus("Unit Berhasil Didaftarkan", "success");
                } catch (err) { showStatus("Gagal Daftar", "error"); } finally { setIsLoading(false); }
            };

            const addOfficer = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const f = window.Firebase;
                const fd = new FormData(e.target);
                const name = fd.get('name').trim().toUpperCase();
                const pass = fd.get('pass').trim();
                try {
                    const db = f.getFirestore();
                    const oRef = f.collection(db, 'artifacts', appId, 'public', 'data', 'officers');
                    await f.addDoc(oRef, { name, password: pass, createdAt: f.Timestamp.now(), status: 'offline' });
                    showStatus("Petugas Berhasil Ditambahkan", "success");
                    e.target.reset();
                } catch (err) { showStatus("Gagal Menambah Petugas", "error"); } finally { setIsLoading(false); }
            };

            const deleteOfficer = async (id) => {
                if(!window.confirm("Hapus akun petugas ini?")) return;
                const f = window.Firebase;
                try {
                    await f.deleteDoc(f.doc(f.getFirestore(), 'artifacts', appId, 'public', 'data', 'officers', id));
                    showStatus("Petugas Dihapus", "success");
                } catch (err) { showStatus("Gagal Menghapus", "error"); }
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0];
                if(file) {
                    setIsLoading(true);
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const compressed = await compressImage(reader.result);
                        setCapturedPhoto(compressed);
                        setIsLoading(false);
                        showStatus("Foto Bukti Siap", "success");
                    };
                    reader.readAsDataURL(file);
                }
            };

            if (!isReady) return <div className="h-screen bg-slate-900 flex items-center justify-center p-12"><div className="loader"></div></div>;

            if (view === 'login') return (
                <div className="h-screen w-full bg-emerald-600 flex items-center justify-center p-6 text-slate-900">
                    <div className="w-full max-w-sm bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 animate-in zoom-in-95 text-center">
                        <div className="flex flex-col items-center gap-4">
                            <div className="h-16 w-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center shadow-inner"><Icon name="ShieldCheck" size={40} /></div>
                            <div><h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">SmartGate</h1><p className="text-slate-400 font-bold uppercase text-[9px] tracking-widest mt-1">AFDELING VI - SEI ROKAN</p></div>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="text-left space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">ID Petugas</label><div className="relative"><Icon name="User" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-200" size={18} /><input type="text" value={officerNameInput} onChange={(e) => setOfficerNameInput(e.target.value)} placeholder="Username..." required className="w-full pl-14 pr-8 py-4 bg-slate-50 border-2 border-slate-50 rounded-[1.8rem] font-bold outline-none focus:border-emerald-500 uppercase text-sm" /></div></div>
                            <div className="text-left space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Sandi</label><div className="relative"><Icon name="Lock" className="absolute left-6 top-1/2 -translate-y-1/2 text-emerald-200" size={18} /><input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••••••" required className="w-full pl-14 pr-14 py-4 bg-slate-50 border-2 border-slate-50 rounded-[1.8rem] font-bold outline-none focus:border-emerald-500 text-sm" /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300">{showPassword ? <Icon name="EyeOff" size={18} /> : <Icon name="Eye" size={18} />}</button></div></div>
                            <button type="submit" disabled={isLoading} className="w-full bg-emerald-600 text-white p-5 rounded-[1.8rem] font-black shadow-xl flex items-center justify-center gap-4 text-sm active:scale-95"> {isLoading ? <div className="loader !w-5 !h-5 !border-white !border-t-transparent"></div> : <Icon name="LogIn" size={18} />} <span>MASUK POS</span></button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col md:flex-row bg-slate-50 text-slate-900 overflow-hidden">
                    <aside className={`fixed md:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 transition-transform duration-300 z-[100] p-8 flex flex-col ${isSidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="flex items-center gap-4 mb-12"><div className="h-12 w-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="ShieldCheck" size={28} /></div><div><h1 className="text-xl font-extrabold text-slate-800 tracking-tighter leading-none">SmartGate</h1><p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest leading-none mt-1">Afdeling VI</p></div><button onClick={() => setIsSidebarOpen(false)} className="md:hidden ml-auto text-slate-300"><Icon name="X" size={24} /></button></div>
                        <nav className="space-y-1 flex-1 overflow-y-auto custom-scroll no-scrollbar">
                            {[{id:'dashboard', icon:'LayoutDashboard', label:'Dashboard'}, {id:'scan', icon:'ShieldCheck', label:'Scan Akses'}, {id:'register', icon:'PlusCircle', label:'Registrasi Unit'}, {id:'units', icon:'Database', label:'Data Unit'}, {id:'history', icon:'History', label:'Log Aktivitas'}].map(item => (
                                <button key={item.id} onClick={async () => { await safelyClearScanner(); setView(item.id); setIsSidebarOpen(false); }} className={`flex items-center space-x-4 w-full p-4 rounded-xl font-bold text-sm transition-all ${view === item.id ? 'bg-emerald-600 text-white shadow-xl' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}><Icon name={item.icon} size={20} /> <span>{item.label}</span></button>
                            ))}
                            {userRole === 'master' && (
                                <button onClick={() => { setView('manage_officers'); setIsSidebarOpen(false); }} className={`flex items-center space-x-4 w-full p-4 rounded-xl font-bold text-sm transition-all ${view === 'manage_officers' ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-500 hover:bg-slate-100'}`}><Icon name="Users" size={20} /> <span>Kelola Tim</span></button>
                            )}
                        </nav>
                        <div className="mt-auto pt-6 space-y-4">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-3 p-4 bg-rose-50 text-rose-600 rounded-2xl font-black text-xs border border-rose-100 uppercase"><Icon name="LogOut" size={16} /> Keluar</button>
                            <div className="p-4 rounded-2xl bg-slate-50 border flex items-center gap-3"><div className="h-10 w-10 rounded-full bg-white text-emerald-600 flex items-center justify-center font-black text-[10px] border">{currentOfficer?.substring(0, 2).toUpperCase()}</div><div><p className="text-[8px] font-black uppercase opacity-60">POS AKTIF</p><p className="text-[10px] font-bold truncate uppercase">{currentOfficer}</p></div></div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="md:hidden bg-white border-b p-4 flex items-center justify-between sticky top-0 z-[80] shadow-sm"><button onClick={() => setIsSidebarOpen(true)} className="p-2 text-slate-600"><Icon name="Menu" size={24} /></button><h2 className="text-[10px] font-black text-emerald-600 uppercase tracking-widest leading-none">SmartGate VI</h2><div className="w-8"></div></header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-12 relative main-content custom-scroll no-scrollbar">
                            {statusMsg && <StatusToast message={statusMsg.text} type={statusMsg.type} />}

                                <h3 className="text-5xl font-black text-slate-900 tracking-tighter leading-none mb-3 uppercase">{selectedQR.platNomor}</h3>
                                <p className="text-emerald-600 font-black uppercase text-[10px] tracking-[0.3em] mb-12 leading-none">{selectedQR.namaPemilik}</p>
                                <button onClick={() => { setRegisteredQR({ ...selectedQR, qrUrl: `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${selectedQR.platNomor}` }); setSelectedQR(null); setTimeout(() => window.print(), 200); }} className="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition-all uppercase tracking-widest">
                                  <Icon name="Printer" size={22} /> CETAK STIKER
                                </button>
                            </div>
                        </div>
                    )}
                    
                    <div className="print-only hidden">
                        {registeredQR && (<div className="flex flex-col items-center justify-center border-2 border-black p-10 w-[100mm] h-[100mm] text-center bg-white text-black"><h1 className="m-0 text-sm font-black uppercase">AFDELING VI SEI ROKAN</h1><img src={registeredQR.qrUrl} className="w-[50mm] h-[50mm] my-4" /><h2 className="m-0 text-4xl font-black uppercase tracking-tighter">{registeredQR.platNomor}</h2><p className="mt-2 text-xs font-bold uppercase">{registeredQR.namaPemilik}</p></div>)}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
